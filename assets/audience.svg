<text x="108" y="52" fill="#F4F7F2" font-size="30" font-weight="800" letter-spacing="1">WHO IT’S FOR</text>
<text x="110" y="80" fill="#16C079" font-size="16" font-weight="600" letter-spacing="0.5">One governed institute. Five ways in. The volume is the machine’s; the judgment stays yours.</text>
<line x1="30" y1="104" x2="1210" y2="104" stroke="#1F4D3B" stroke-width="1.3"/>
<rect x="30" y="124" width="223" height="316" rx="12" fill="#0E3326" stroke="#1F4D3B" stroke-width="1.3"/>
