<text x="48" y="202" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">RESEARCHERS</text>
<text x="48" y="223" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">&amp; PIs</text>
<text x="48" y="256" fill="#8AA197" font-size="13" font-weight="500">Run a project end to end,</text>
<text x="48" y="276" fill="#8AA197" font-size="13" font-weight="500">from RFP to publish,</text>
<text x="48" y="296" fill="#8AA197" font-size="13" font-weight="500">a human at every gate.</text>
<text x="48" y="422" fill="#0E8E5B" font-size="10.5" font-weight="600" font-family="ui-monospace, monospace">46 agents · 8 gates</text>
