<rect x="269" y="124" width="223" height="6" rx="3" fill="#16C079"/>
<circle cx="295" cy="162" r="15" fill="#15402F" stroke="#16C079" stroke-width="1.4"/>
<text x="295" y="167" text-anchor="middle" fill="#16C079" font-size="15" font-weight="800">2</text>
<text x="287" y="202" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">RESEARCH ADMIN</text>
<text x="287" y="223" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">&amp; SPONSORED PROGRAMS</text>
<text x="287" y="256" fill="#8AA197" font-size="13" font-weight="500">Pre-award drafting,</text>
<text x="287" y="276" fill="#8AA197" font-size="13" font-weight="500">budget-to-solicitation review,</text>
<text x="287" y="296" fill="#8AA197" font-size="13" font-weight="500">an AI-use disclosure builder.</text>
<text x="287" y="422" fill="#0E8E5B" font-size="10.5" font-weight="600" font-family="ui-monospace, monospace">ai_disclosure · budget_review</text>
<rect x="508" y="124" width="223" height="316" rx="12" fill="#0E3326" stroke="#1F4D3B" stroke-width="1.3"/>
<rect x="508" y="124" width="223" height="6" rx="3" fill="#B7F36A"/>
<circle cx="534" cy="162" r="15" fill="#15402F" stroke="#B7F36A" stroke-width="1.4"/>
<text x="534" y="167" text-anchor="middle" fill="#B7F36A" font-size="15" font-weight="800">3</text>
<text x="526" y="202" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">DEVELOPERS</text>
<text x="526" y="223" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">&amp; CONTRIBUTORS</text>
<text x="526" y="256" fill="#8AA197" font-size="13" font-weight="500">A plugin with an MCP server,</text>
<text x="526" y="276" fill="#8AA197" font-size="13" font-weight="500">a 121-tool stdlib kit,</text>
<text x="526" y="296" fill="#8AA197" font-size="13" font-weight="500">tests, clean extension points.</text>
<text x="526" y="422" fill="#0E8E5B" font-size="10.5" font-weight="600" font-family="ui-monospace, monospace">MCP · pytest · skills</text>
<rect x="748" y="124" width="223" height="316" rx="12" fill="#0E3326" stroke="#1F4D3B" stroke-width="1.3"/>
<rect x="748" y="124" width="223" height="6" rx="3" fill="#16C079"/>
<circle cx="774" cy="162" r="15" fill="#15402F" stroke="#16C079" stroke-width="1.4"/>
<text x="774" y="167" text-anchor="middle" fill="#16C079" font-size="15" font-weight="800">4</text>
<text x="766" y="202" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">INSTITUTIONS</text>
<text x="766" y="223" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">&amp; FUNDERS</text>
<text x="766" y="256" fill="#8AA197" font-size="13" font-weight="500">MIT, local-first,</text>
<text x="766" y="276" fill="#8AA197" font-size="13" font-weight="500">data-sovereign; every gate</text>
<text x="766" y="296" fill="#8AA197" font-size="13" font-weight="500">logged in plain markdown.</text>
<text x="766" y="422" fill="#0E8E5B" font-size="10.5" font-weight="600" font-family="ui-monospace, monospace">GATES.md · auditable</text>
<rect x="987" y="124" width="223" height="316" rx="12" fill="#0E3326" stroke="#1F4D3B" stroke-width="1.3"/>
<rect x="987" y="124" width="223" height="6" rx="3" fill="#B7F36A"/>
<circle cx="1013" cy="162" r="15" fill="#15402F" stroke="#B7F36A" stroke-width="1.4"/>
<text x="1013" y="167" text-anchor="middle" fill="#B7F36A" font-size="15" font-weight="800">5</text>
<text x="1005" y="202" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">EDUCATORS</text>
<text x="1005" y="223" fill="#F4F7F2" font-size="14" font-weight="800" letter-spacing="0">&amp; LEARNERS</text>
<text x="1005" y="256" fill="#8AA197" font-size="13" font-weight="500">The Academy: ten modules,</text>
<text x="1005" y="276" fill="#8AA197" font-size="13" font-weight="500">three tiers, plus a</text>
<text x="1005" y="296" fill="#8AA197" font-size="13" font-weight="500">Learning Lab every run.</text>
<text x="1005" y="422" fill="#0E8E5B" font-size="10.5" font-weight="600" font-family="ui-monospace, monospace">academy · learning gate</text>
<text x="1210" y="452" text-anchor="end" fill="#8AA197" font-size="12" font-weight="500">MIT · local-first · human-in-the-loop at every gate</text>
