<line x1="40" y1="200" x2="1080" y2="200" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>
<rect x="80" y="188" width="50" height="24" rx="7" fill="#B7F36A" stroke="#0B2E22"/>
