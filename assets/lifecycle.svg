<rect x="628" y="380" width="16" height="14" rx="7" fill="#19C0A6" fill-opacity="0.2" stroke="#19C0A6"/><text x="650" y="392" font-size="11.5" fill="#8AA197">council acting in this phase</text>
<text x="40" y="450" font-size="11" fill="#6f8a7e">Gates are prompt-level and token-checked, not a hard OS lock. The point is that a person decides at each one.</text>
