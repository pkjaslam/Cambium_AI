<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" font-family="Inter,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The Cambium research lifecycle: eight phases, each showing the councils that act in it, the human gate that closes it, and what the person decides at that gate. Results at G4 are accepted only after every number is reproduced. A named person signs every gate.">
<defs>
<linearGradient id="lbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0b2c20"/><stop offset="100%" stop-color="#07231a"/></linearGradient>
<linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#16C079"/><stop offset="100%" stop-color="#B7F36A"/></linearGradient>
</defs>
<rect width="1120" height="470" rx="18" fill="url(#lbg)"/>
<rect x="1" y="1" width="1118" height="468" rx="17" fill="none" stroke="#1F4D3B"/>
<text x="40" y="44" font-size="25" font-weight="800" fill="#F4F7F2">The Cambium research lifecycle</text>
<text x="40" y="69" font-size="13.5" fill="#8AA197">Eight phases, eight human gates. A named person signs each one, and this is what they decide.</text>
<rect x="47" y="92" width="116" height="70" rx="12" fill="#0E3326" stroke="#1F4D3B"/>
<text x="105" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#F4F7F2">Intake</text>
<text x="105" y="144" text-anchor="middle" font-size="9.5" fill="#8AA197">know the PI and RFP</text>
<text x="170.0" y="134" text-anchor="middle" font-size="17" fill="#16C079">&#8250;</text>
<rect x="177" y="92" width="116" height="70" rx="12" fill="#0E3326" stroke="#1F4D3B"/>
<text x="235" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#F4F7F2">Pre-Award</text>
<text x="235" y="144" text-anchor="middle" font-size="9.5" fill="#8AA197">ideas, team, aims</text>
<text x="300.0" y="134" text-anchor="middle" font-size="17" fill="#16C079">&#8250;</text>
<rect x="307" y="92" width="116" height="70" rx="12" fill="#0E3326" stroke="#1F4D3B"/>
<text x="365" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#F4F7F2">Design</text>
<text x="365" y="144" text-anchor="middle" font-size="9.5" fill="#8AA197">approach, budget</text>
<text x="430.0" y="134" text-anchor="middle" font-size="17" fill="#16C079">&#8250;</text>
<rect x="437" y="92" width="116" height="70" rx="12" fill="#0E3326" stroke="#1F4D3B"/>
<text x="495" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#F4F7F2">Submit</text>
<text x="495" y="144" text-anchor="middle" font-size="9.5" fill="#8AA197">proposal final</text>
<text x="560.0" y="134" text-anchor="middle" font-size="17" fill="#16C079">&#8250;</text>
<rect x="567" y="92" width="116" height="70" rx="12" fill="#0E3326" stroke="#1F4D3B"/>
<text x="625" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#F4F7F2">Build / Run-Lab</text>
<text x="625" y="144" text-anchor="middle" font-size="9.5" fill="#8AA197">run the work</text>
