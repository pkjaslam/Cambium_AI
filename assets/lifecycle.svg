<text x="755" y="204" text-anchor="middle" font-size="11" font-weight="800" fill="#062013">G4</text>
<text x="755" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F7F2">accept results</text>
<rect x="703" y="242" width="104" height="17" rx="8.5" fill="none" stroke="#16C079" stroke-width="1.1"/>
<text x="755" y="254" text-anchor="middle" font-size="8.7" font-weight="700" fill="#16C079">every number reproduced</text>
<rect x="860" y="188" width="50" height="24" rx="7" fill="#B7F36A" stroke="#0B2E22"/>
<text x="885" y="204" text-anchor="middle" font-size="11" font-weight="800" fill="#062013">G5</text>
<text x="885" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F7F2">release report?</text>
<rect x="990" y="188" width="50" height="24" rx="7" fill="#B7F36A" stroke="#0B2E22"/>
<text x="1015" y="204" text-anchor="middle" font-size="11" font-weight="800" fill="#062013">G6</text>
<text x="1015" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F7F2">go public?</text>
<text x="40" y="298" font-size="10" letter-spacing="1.5" fill="#8AA197">WHO ACTS IN EACH PHASE</text>
<rect x="49" y="310" width="112" height="22" rx="11" fill="#7C5CFF" fill-opacity="0.15" stroke="#7C5CFF" stroke-opacity="0.6"/>
