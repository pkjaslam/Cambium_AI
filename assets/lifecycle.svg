<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <!--
    Lifecycle strip: horizontal flow
    PRE-AWARD  |  POST-AWARD
    RFP → G1 → Ideate → G2 → Aims+Faculty → Collaborators → G3a → Proposal → G3 → Develop → Verify → G4 → Revise → Report → G5/G6
    Gates = gold diamonds
    Light background for GitHub README compatibility
  -->
  <defs>
    <style>
      .stglbl  { font-size:9.5px; font-weight:700; fill:#111; text-anchor:middle; }
      .stgsub  { font-size:8px;   fill:#555;        text-anchor:middle; }
      .gatelbl { font-size:8.5px; font-weight:800;  fill:#92400e; text-anchor:middle; }
      .gatesub { font-size:7.5px; fill:#78350f;     text-anchor:middle; }
      .phlbl   { font-size:9px;   font-weight:700;  fill:#fff; text-anchor:middle; letter-spacing:.5px; }
      .arrow   { stroke:#94a3b8; stroke-width:1.5; marker-end:url(#arr); fill:none; }
      .divline { stroke:#cbd5e1; stroke-width:1.5; stroke-dasharray:5,4; fill:none; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="960" height="320" fill="#f8f9fc" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="38" fill="#111827" rx="10"/>
  <rect x="0" y="28" width="960" height="10" fill="#111827"/>
  <text x="480" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Cambium — Research Lifecycle</text>

  <!-- Phase banner: PRE-AWARD -->
  <rect x="14"  y="44" width="494" height="18" rx="4" fill="#4ec5e0"/>
  <text x="261" y="56" class="phlbl">PRE-AWARD</text>

  <!-- Phase banner: POST-AWARD -->
  <rect x="516" y="44" width="430" height="18" rx="4" fill="#46c46a"/>
  <text x="731" y="56" class="phlbl">POST-AWARD (after sponsor approval)</text>

  <!-- Divider line between phases -->
  <line x1="507" y1="44" x2="507" y2="280" class="divline"/>

  <!--
    Layout plan (y=80 for stage boxes, y=175 for labels/sub below arrows)
    Stages at x centers: 38 76 142 210 286 368 438 500 | 560 640 706 770 836 904
    We'll use a single horizontal lane.

    x positions for stage centers (14 stages + START node):
    RFP=48, G1=120, Ideate=198, G2=272, Aims=346, Collab=430, G3a=506, Prop=572, G3=640, Dev=710, Verify=778, G4=842, Report=904
    Actually let's use 13 items across 960px with some margin
  -->

  <!-- ════════════════════════════
       STAGE BOXES (rounded rects, 62 wide × 52 tall centered at y=100)
  ════════════════════════════ -->

  <!-- RFP Intake - x=34 -->
  <rect x="14"  y="78" width="68" height="52" rx="6" fill="#dbeafe" stroke="#4ec5e0" stroke-width="1.5"/>
  <text x="48" y="100" class="stglbl">RFP</text>
  <text x="48" y="113" class="stgsub">Intake</text>
  <text x="48" y="124" class="stgsub">#24 Analyst</text>

  <!-- Arrow RFP → G1 -->
  <line x1="82" y1="104" x2="98" y2="104" class="arrow"/>

  <!-- GATE G1 (gold diamond) x=112 -->
  <polygon points="112,84 130,104 112,124 94,104" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="112" y="101" class="gatelbl">G1</text>
  <text x="112" y="113" class="gatesub">pursue?</text>

  <!-- Arrow G1 → Ideate -->
  <line x1="130" y1="104" x2="148" y2="104" class="arrow"/>

  <!-- Ideate - x=184 -->
  <rect x="148" y="78" width="72" height="52" rx="6" fill="#dbeafe" stroke="#4ec5e0" stroke-width="1.5"/>
  <text x="184" y="98" class="stglbl">Ideation</text>
  <text x="184" y="110" class="stgsub">#26 Facilitator</text>
  <text x="184" y="122" class="stgsub">+ Faculty #28</text>

  <!-- Arrow Ideate → G2 -->
  <line x1="220" y1="104" x2="238" y2="104" class="arrow"/>

  <!-- GATE G2 x=252 -->
  <polygon points="252,84 270,104 252,124 234,104" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="252" y="101" class="gatelbl">G2</text>
  <text x="252" y="113" class="gatesub">idea?</text>

  <!-- Arrow G2 → Aims -->
  <line x1="270" y1="104" x2="288" y2="104" class="arrow"/>

  <!-- Aims + Faculty - x=316 -->
  <rect x="288" y="78" width="72" height="52" rx="6" fill="#dbeafe" stroke="#4ec5e0" stroke-width="1.5"/>
  <text x="324" y="97" class="stglbl">Aims +</text>
  <text x="324" y="109" class="stglbl">Faculty</text>
  <text x="324" y="122" class="stgsub">#25 PI + #28</text>

  <!-- Arrow Aims → Collaborators -->
  <line x1="360" y1="104" x2="378" y2="104" class="arrow"/>

  <!-- Collaborators - x=406 -->
  <rect x="378" y="78" width="72" height="52" rx="6" fill="#e0fdf4" stroke="#5ee0a8" stroke-width="1.5"/>
  <text x="414" y="97" class="stglbl">Collab-</text>
  <text x="414" y="109" class="stglbl">orators</text>
  <text x="414" y="122" class="stgsub">#31 Scout</text>

  <!-- Arrow Collab → G3a -->
  <line x1="450" y1="104" x2="466" y2="104" class="arrow"/>

  <!-- GATE G3a x=480 -->
  <polygon points="480,84 498,104 480,124 462,104" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="480" y="100" class="gatelbl">G3a</text>
  <text x="480" y="112" class="gatesub">who to</text>
  <text x="480" y="122" class="gatesub">contact?</text>

  <!-- Arrow G3a → Proposal -->
  <line x1="498" y1="104" x2="516" y2="104" class="arrow"/>

  <!-- ── POST-AWARD region starts ── -->

  <!-- Proposal Draft - x=548 -->
  <rect x="518" y="78" width="72" height="52" rx="6" fill="#dbeafe" stroke="#4ec5e0" stroke-width="1.5"/>
  <text x="554" y="97" class="stglbl">Proposal</text>
  <text x="554" y="109" class="stglbl">Draft</text>
  <text x="554" y="122" class="stgsub">#27 Writer</text>

  <!-- Arrow Proposal → G3 -->
  <line x1="590" y1="104" x2="608" y2="104" class="arrow"/>

  <!-- GATE G3 x=622 -->
  <polygon points="622,84 640,104 622,124 604,104" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="622" y="101" class="gatelbl">G3</text>
  <text x="622" y="113" class="gatesub">submit?</text>

  <!-- SPONSOR APPROVAL arc -->
  <rect x="648" y="86" width="56" height="36" rx="18" fill="#1f2937" stroke="#e7b84b" stroke-width="1.5"/>
  <text x="676" y="101" text-anchor="middle" font-size="7.5" font-weight="800" fill="#e7b84b">SPONSOR</text>
  <text x="676" y="113" text-anchor="middle" font-size="7.5" fill="#d1d5db">APPROVAL</text>
  <!-- Arrow G3 → Sponsor -->
  <line x1="640" y1="104" x2="648" y2="104" class="arrow"/>
  <!-- Arrow Sponsor → Develop -->
  <line x1="704" y1="104" x2="718" y2="104" class="arrow"/>

  <!-- Develop - x=748 -->
  <rect x="718" y="78" width="66" height="52" rx="6" fill="#dcfce7" stroke="#46c46a" stroke-width="1.5"/>
  <text x="751" y="98" class="stglbl">Develop</text>
  <text x="751" y="110" class="stgsub">Labs #04-06</text>
  <text x="751" y="122" class="stgsub">Exec #11-12</text>

  <!-- Arrow Develop → Verify -->
  <line x1="784" y1="104" x2="800" y2="104" class="arrow"/>

  <!-- Verify - x=830 -->
  <rect x="800" y="78" width="60" height="52" rx="6" fill="#fee2e2" stroke="#e5534b" stroke-width="1.5"/>
  <text x="830" y="98" class="stglbl">Verify</text>
  <text x="830" y="110" class="stgsub">#07-10</text>
  <text x="830" y="122" class="stgsub">Boards</text>

  <!-- Arrow Verify → G4 -->
  <line x1="860" y1="104" x2="876" y2="104" class="arrow"/>

  <!-- GATE G4 x=890 -->
  <polygon points="890,84 908,104 890,124 872,104" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="890" y="101" class="gatelbl">G4</text>
  <text x="890" y="113" class="gatesub">fixes?</text>

  <!-- ════════════════════════════
       SECOND ROW: Revise → Report → G5/G6
       Route G4 downward, then left-to-right in row 2
  ════════════════════════════ -->

  <!-- G4 down-arrow to row 2 -->
  <line x1="890" y1="124" x2="890" y2="175" class="arrow"/>

  <!-- Revise - x=830, y=175 -->
  <rect x="800" y="155" width="70" height="48" rx="6" fill="#dcfce7" stroke="#46c46a" stroke-width="1.5"/>
  <text x="835" y="173" class="stglbl">Revise</text>
  <text x="835" y="185" class="stgsub">#11-12 Exec</text>
  <text x="835" y="197" class="stgsub">+ Labs</text>
  <!-- Arrow Revise ← G4 (right to left in row 2) -->
  <line x1="870" y1="179" x2="870" y2="179"/>
  <line x1="890" y1="175" x2="870" y2="179" class="arrow"/>

  <!-- Arrow Revise → Report -->
  <line x1="800" y1="179" x2="784" y2="179" class="arrow"/>

  <!-- Report - x=740, y=155 -->
  <rect x="714" y="155" width="70" height="48" rx="6" fill="#fef9c3" stroke="#b9a04a" stroke-width="1.5"/>
  <text x="749" y="173" class="stglbl">Report</text>
  <text x="749" y="185" class="stgsub">#29 Officer</text>
  <text x="749" y="197" class="stgsub">#30 Deck</text>

  <!-- Arrow Report → G5/G6 -->
  <line x1="714" y1="179" x2="700" y2="179" class="arrow"/>

  <!-- GATE G5 x=682 -->
  <polygon points="682,159 700,179 682,199 664,179" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="682" y="176" class="gatelbl">G5</text>
  <text x="682" y="188" class="gatesub">release?</text>

  <!-- Arrow G5 → G6 -->
  <line x1="664" y1="179" x2="648" y2="179" class="arrow"/>

  <!-- GATE G6 x=630 -->
  <polygon points="630,159 648,179 630,199 612,179" fill="#fef08a" stroke="#e7b84b" stroke-width="2"/>
  <text x="630" y="176" class="gatelbl">G6</text>
  <text x="630" y="188" class="gatesub">publish?</text>

  <!-- Published badge -->
  <rect x="574" y="162" width="48" height="34" rx="17" fill="#1f2937" stroke="#46c46a" stroke-width="1.5"/>
  <text x="598" y="177" text-anchor="middle" font-size="7.5" font-weight="800" fill="#46c46a">FINAL</text>
  <text x="598" y="189" text-anchor="middle" font-size="7.5" fill="#d1d5db">OUTPUT</text>
  <line x1="612" y1="179" x2="622" y2="179" class="arrow"/>

  <!-- ════════════════════════════
       LEGEND / KEY
  ════════════════════════════ -->
  <rect x="14" y="224" width="932" height="80" rx="7" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="241" font-size="9" font-weight="700" fill="#374151" letter-spacing=".8px">KEY</text>

  <!-- Stage box example -->
  <rect x="30" y="248" width="36" height="20" rx="4" fill="#dbeafe" stroke="#4ec5e0" stroke-width="1.5"/>
  <text x="48" y="262" text-anchor="middle" font-size="8" fill="#1e40af">Stage</text>
  <text x="74" y="262" font-size="9" fill="#444">Research stage (agent-driven)</text>

  <!-- Gate diamond example -->
  <polygon points="175,248 185,258 175,268 165,258" fill="#fef08a" stroke="#e7b84b" stroke-width="1.5"/>
  <text x="175" y="261" text-anchor="middle" font-size="7.5" font-weight="800" fill="#92400e">Gn</text>
  <text x="196" y="262" font-size="9" fill="#444">Human gate — President/Director must approve to proceed</text>

  <!-- Approval box -->
  <rect x="412" y="248" width="50" height="20" rx="10" fill="#1f2937" stroke="#e7b84b" stroke-width="1.5"/>
  <text x="437" y="261" text-anchor="middle" font-size="7.5" fill="#e7b84b">EXTERNAL</text>
  <text x="469" y="262" font-size="9" fill="#444">Sponsor/external review step</text>

  <!-- Color key -->
  <rect x="600" y="248" width="14" height="14" rx="2" fill="#4ec5e0"/>
  <text x="619" y="260" font-size="9" fill="#444">Pre-Award stages</text>
  <rect x="730" y="248" width="14" height="14" rx="2" fill="#46c46a"/>
  <text x="749" y="260" font-size="9" fill="#444">Post-Award stages</text>
  <rect x="860" y="248" width="14" height="14" rx="2" fill="#fee2e2" stroke="#e5534b" stroke-width="1"/>
  <text x="879" y="260" font-size="9" fill="#444">Verification</text>

  <text x="30" y="288" font-size="9" fill="#555">Flow: RFP → G1 → Ideation → G2 → Aims/Faculty → Collaborators → G3a → Proposal → G3 → [Sponsor] → Develop → Verify → G4 → Revise → Report → G5 → G6 → Published</text>
  <text x="480" y="308" text-anchor="middle" font-size="8" fill="#9ca3af">Cambium · 6 human gates · no step proceeds without President/Director approval</text>
</svg>
