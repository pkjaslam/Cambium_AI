<text x="105" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F7F2">worth our time?</text>
<rect x="210" y="188" width="50" height="24" rx="7" fill="#B7F36A" stroke="#0B2E22"/>
