<text x="495" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#F4F7F2">finalize &amp; submit</text>
<text x="495" y="249" text-anchor="middle" font-size="9" font-weight="700" fill="#E0B24A">Director only</text>
<rect x="600" y="188" width="50" height="24" rx="7" fill="#B7F36A" stroke="#0B2E22"/>
