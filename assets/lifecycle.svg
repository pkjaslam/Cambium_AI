<rect x="40" y="380" width="16" height="14" rx="4" fill="#B7F36A"/><text x="62" y="392" font-size="11.5" fill="#8AA197">human gate</text>
<rect x="176" y="380" width="16" height="14" rx="4" fill="#E0B24A"/><text x="198" y="392" font-size="11.5" fill="#8AA197">Director-only gate</text>
