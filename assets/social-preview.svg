<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Cambium social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0e1530"/><stop offset="60%" stop-color="#0b1020"/></linearGradient>
    <radialGradient id="w3" cx="42%" cy="38%" r="70%"><stop offset="0%" stop-color="#13402f"/><stop offset="100%" stop-color="#0a241b"/></radialGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="none"/>
  <!-- mark -->
  <g transform="translate(120,200)">
    <rect width="240" height="240" rx="44" fill="url(#w3)" stroke="#243358" stroke-width="2"/>
    <g fill="none" stroke="#cfd6e0" stroke-opacity="0.5" transform="translate(120,120)">
      <circle r="34" stroke-width="2.4"/><circle r="52" stroke-width="2.4"/><circle r="70" stroke-width="2.4"/><circle r="88" stroke-width="2.4"/>
    </g>
    <circle cx="120" cy="120" r="100" fill="none" stroke="#e7b84b" stroke-width="9"/>
    <circle cx="120" cy="120" r="109" fill="none" stroke="#2b1c10" stroke-width="6"/>
    <circle cx="120" cy="120" r="6" fill="#e7b84b"/>
    <path d="M120 120 V56 M120 76 C108 70 100 64 96 54 M120 76 C132 70 140 64 144 54" fill="none" stroke="#7fe0a8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- text -->
  <text x="430" y="250" font-family="Georgia,'Times New Roman',serif" font-size="118" font-weight="700" fill="#ffffff">Cambium</text>
  <text x="436" y="312" font-family="Helvetica,Arial,sans-serif" font-size="30" fill="#e7b84b">A human-governed AI research institution.</text>
  <text x="436" y="356" font-family="Helvetica,Arial,sans-serif" font-size="26" fill="#9fb0d0">From RFP to verified results — a human in the loop at every gate.</text>
  <!-- chips -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="700">
    <g transform="translate(436,400)"><rect width="150" height="44" rx="22" fill="#4f8cff22" stroke="#4f8cff66"/><text x="20" y="29" fill="#9cc0ff">45 agents</text></g>
    <g transform="translate(600,400)"><rect width="150" height="44" rx="22" fill="#46c46a22" stroke="#46c46a66"/><text x="22" y="29" fill="#9af0b3">11 councils</text></g>
    <g transform="translate(764,400)"><rect width="160" height="44" rx="22" fill="#e5534b22" stroke="#e5534b66"/><text x="20" y="29" fill="#ff9a93">AI-governed</text></g>
    <g transform="translate(938,400)"><rect width="170" height="44" rx="22" fill="#e7b84b22" stroke="#e7b84b66"/><text x="20" y="29" fill="#e7b84b">CI-checked</text></g>
  </g>
  <text x="436" y="486" font-family="Helvetica,Arial,sans-serif" font-size="22" fill="#6b7a8d">github.com/IFC-UIDAHO/Cambium_AI · MIT · University of Idaho · Intermountain Forestry Cooperative</text>
</svg>
