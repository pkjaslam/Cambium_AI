<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Cambium"
     font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="sp-glow" cx="74%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#16C079" stop-opacity="0.32"/>
      <stop offset="45%" stop-color="#0E8E5B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#07231A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sp-bg" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#0E3326"/>
      <stop offset="100%" stop-color="#07231A"/>
    </radialGradient>
    <radialGradient id="sp-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAFFC9"/>
      <stop offset="45%" stop-color="#B7F36A"/>
      <stop offset="100%" stop-color="#B7F36A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- evergreen field + soft emerald glow -->
  <rect width="1280" height="640" fill="#07231A"/>
  <rect width="1280" height="640" fill="url(#sp-glow)"/>
  <rect x="20" y="20" width="1240" height="600" rx="28" fill="none" stroke="#1F4D3B" stroke-width="1.5"/>

  <!-- mark -->
  <g transform="translate(96,232) scale(0.9)">
    <rect x="0" y="0" width="200" height="200" rx="42" fill="url(#sp-bg)"/>
    <rect x="0.5" y="0.5" width="199" height="199" rx="41.5" fill="none" stroke="#1F4D3B" stroke-width="1"/>
    <g fill="none" stroke="#16C079" stroke-linecap="round">
      <circle cx="100" cy="100" r="22" stroke-width="2"   opacity="0.55"/>
      <circle cx="100" cy="100" r="36" stroke-width="1.8" opacity="0.7"/>
      <circle cx="100" cy="100" r="50" stroke-width="1.6" opacity="0.85"/>
      <circle cx="100" cy="100" r="64" stroke-width="1.5"/>
    </g>
    <line x1="100" y1="100" x2="145.25" y2="54.75" stroke="#16C079" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
    <circle cx="100" cy="100" r="4.5" fill="#16C079"/>
    <circle cx="145.25" cy="54.75" r="16" fill="url(#sp-node)"/>
    <circle cx="145.25" cy="54.75" r="6.5" fill="#B7F36A"/>
    <circle cx="145.25" cy="54.75" r="2.6" fill="#052015"/>
  </g>

  <!-- wordmark + copy -->
  <g transform="translate(330,0)">
    <text x="0" y="270" fill="#F4F7F2" font-size="132" font-weight="800" letter-spacing="-5">Cambium</text>
    <circle cx="612" cy="232" r="13" fill="#B7F36A"/>

    <text x="4" y="338" fill="#8AA197" font-size="27" font-weight="500" letter-spacing="0.2">A research institution you run with one sentence —</text>
    <text x="4" y="378" fill="#8AA197" font-size="27" font-weight="500" letter-spacing="0.2">RFP to verified results, human-in-the-loop at every gate.</text>

    <!-- stat line -->
    <g transform="translate(4,440)">
      <text x="0" y="0" font-size="26" font-weight="700">
        <tspan fill="#16C079">46</tspan><tspan fill="#8AA197"> agents</tspan>
        <tspan fill="#1F4D3B">  ·  </tspan>
        <tspan fill="#16C079">11</tspan><tspan fill="#8AA197"> councils</tspan>
        <tspan fill="#1F4D3B">  ·  </tspan>
        <tspan fill="#B7F36A">8</tspan><tspan fill="#8AA197"> gates</tspan>
      </text>
    </g>
  </g>
</svg>
