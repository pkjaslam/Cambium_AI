  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);

          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ault&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Cinematic VFX&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.canvasRef = React.createRef();\n    this.heroRef = React.createRef();\n    this.progressRef = React.createRef();\n    this._raf = null;\n    this._tiltEl = null;\n  }\n\n  componentDidMount() {\n    this.startCore();\n    this.setupReveal();\n    this.setupTilt();\n    this.setupParallax();\n  }\n\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._ro) this._ro.disconnect();\n    if (this._revealInterval) clearInterval(this._revealInterval);\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n    if (this._onMove) document.removeEventListener('pointermove', this._onMove);\n    if (this._onOut) document.removeEventListener('pointerout', this._onOut);\n  }\n\n  /* ---------- scroll reveal + progress (visible-by-default, animation is additive) ---------- */\n  setupReveal() {\n    const check = () => {\n      const vh = window.innerHeight;\n      document.querySelectorAll('[data-reveal]:not(.anim)').forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.94 && r.bottom > 0) el.classList.add('anim');\n      });\n      const bar = this.progressRef.current;\n      if (bar) {\n        const doc = document.documentElement;\n        const max = doc.scrollHeight - window.innerHeight;\n        bar.style.width = (max > 0 ? (window.scrollY / max) * 100 : 0) + '%';\n      }\n    };\n    let ticking = false;\n    this._onScroll = () => {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(() => { ticking = false; check(); });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    check();\n    this._revealInterval = setInterval(check, 700);\n  }\n\n  /* ---------- cursor-tracking 3D tilt with glare (document delegation — survives re-renders) ---------- */\n  setupTilt() {\n    const reset = (el) => {\n      el.style.transform = '';\n      const g = el.querySelector('[data-glare]');\n      if (g) g.style.opacity = '0';\n    };\n    this._onMove = (e) => {\n      const el = e.target && e.target.closest ? e.target.closest('[data-tilt]') : null;\n      if (this._tiltEl && this._tiltEl !== el) reset(this._tiltEl);\n      this._tiltEl = el;\n      if (!el) return;\n      const r = el.getBoundingClientRect();\n      const px = (e.clientX - r.left) / r.width;\n      const py = (e.clientY - r.top) / r.height;\n      const rx = (0.5 - py) * 10;\n      const ry = (px - 0.5) * 12;\n      el.style.transform = 'rotateX(' + rx.toFixed(2) + 'deg) rotateY(' + ry.toFixed(2) + 'deg) translateY(-6px)';\n      const g = el.querySelector('[data-glare]');\n      if (g) {\n        g.style.opacity = '1';\n        g.style.background = 'radial-gradient(circle 320px at ' + (px * 100).toFixed(1) + '% ' + (py * 100).toFixed(1) + '%, rgba(198,232,155,.16), transparent 60%)';\n      }\n    };\n    this._onOut = (e) => {\n      if (this._tiltEl && !e.relatedTarget) { reset(this._tiltEl); this._tiltEl = null; }\n    };\n    document.addEventListener('pointermove', this._onMove, { passive: true });\n    document.addEventListener('pointerout', this._onOut, { passive: true });\n  }\n\n  /* ---------- hero mouse parallax on [data-depth] layers ---------- */\n  setupParallax() {\n    const hero = this.heroRef.current;\n    if (!hero) return;\n    hero.addEventListener('pointermove', (e) => {\n      const r = hero.getBoundingClientRect();\n      const dx = (e.clientX - r.left) / r.width - 0.5;\n      const dy = (e.clientY - r.top) / r.height - 0.5;\n      hero.querySelectorAll('[data-depth]').forEach((el) => {\n        const d = parseFloat(el.getAttribute('data-depth')) || 0;\n        el.style.marginLeft = (-dx * d) + 'px';\n        el.style.marginTop = (-dy * d) + 'px';\n      });\n      this._mouse = { dx, dy };\n    }, { passive: true });\n  }\n\n  /* ---------- 3D rotating neural core + ambient dust ---------- */\n  startCore() {\n    const canvas = this.canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const density = this.props.particleDensity ?? 200;\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let W = 0, H = 0, nodes = [], dust = [];\n    this._mouse = { dx: 0, dy: 0 };\n\n    const build = () => {\n      const n = Math.round(density * Math.min(1.4, Math.max(0.6, W / 1300)));\n      nodes = Array.from({ length: n }, () => {\n        // fibonacci-ish random sphere\n        const u = Math.random() * 2 - 1;\n        const th = Math.random() * Math.PI * 2;\n        const s = Math.sqrt(1 - u * u);\n        const jitter = 0.82 + Math.random() * 0.36;\n        return { x: s * Math.cos(th) * jitter, y: u * jitter, z: s * Math.sin(th) * jitter, tw: Math.random() * Math.PI * 2 };\n      });\n      dust = Array.from({ length: Math.round(n * 0.4) }, () => ({\n        x: Math.random() * W, y: Math.random() * H,\n        vx: (Math.random() - 0.5) * 0.22, vy: (Math.random() - 0.5) * 0.22,\n        r: 0.6 + Math.random() * 1.4, a: 0.15 + Math.random() * 0.4\n      }));\n    };\n    const resize = () => {\n      const r = canvas.getBoundingClientRect();\n      W = r.width; H = r.height;\n      canvas.width = W * dpr; canvas.height = H * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      build();\n    };\n    resize();\n    this._ro = new ResizeObserver(resize);\n    this._ro.observe(canvas);\n\n    let rotY = 0, rotX = 0.22, t = 0;\n    const tick = () => {\n      t += 0.016;\n      const targetX = 0.22 + (this._mouse ? this._mouse.dy * 0.5 : 0);\n      rotX += (targetX - rotX) * 0.04;\n      rotY += 0.0022 + (this._mouse ? this._mouse.dx * 0.004 : 0);\n\n      ctx.clearRect(0, 0, W, H);\n\n      // ambient dust\n      for (const p of dust) {\n        p.x += p.vx; p.y += p.vy;\n        if (p.x < -5) p.x = W + 5; if (p.x > W + 5) p.x = -5;\n        if (p.y < -5) p.y = H + 5; if (p.y > H + 5) p.y = -5;\n        ctx.fillStyle = 'rgba(198,232,155,' + (p.a * (0.6 + 0.4 * Math.sin(t * 2 + p.x))).toFixed(3) + ')';\n        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();\n      }\n\n      // 3D core\n      const cx = W / 2, cy = H * 0.44;\n      const R = Math.min(W, H) * 0.36;\n      const f = 3.2;\n      const cosY = Math.cos(rotY), sinY = Math.sin(rotY);\n      const cosX = Math.cos(rotX), sinX = Math.sin(rotX);\n      const proj = [];\n      for (const nd of nodes) {\n        let x = nd.x * cosY - nd.z * sinY;\n        let z = nd.x * sinY + nd.z * cosY;\n        let y = nd.y * cosX - z * sinX;\n        z = nd.y * sinX + z * cosX;\n        const sc = f / (f + z);\n        proj.push({ sx: cx + x * R * sc, sy: cy + y * R * sc, sc, tw: nd.tw });\n      }\n      const LINK = R * 0.42;\n      ctx.lineWidth = 1;\n      for (let i = 0; i < proj.length; i++) {\n        for (let j = i + 1; j < proj.length; j++) {\n          const a = proj[i], b = proj[j];\n          const ddx = a.sx - b.sx, ddy = a.sy - b.sy;\n          const d2 = ddx * ddx + ddy * ddy;\n          if (d2 < LINK * LINK) {\n            const tt = (1 - Math.sqrt(d2) / LINK) * Math.min(a.sc, b.sc);\n            ctx.strokeStyle = 'rgba(151,188,98,' + (tt * 0.24).toFixed(3) + ')';\n            ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();\n          }\n        }\n      }\n      for (const p of proj) {\n        const tw = 0.55 + 0.45 * Math.sin(t * 2.4 + p.tw);\n        const alpha = Math.max(0, (p.sc - 0.6)) * 1.6 * tw;\n        ctx.fillStyle = 'rgba(198,232,155,' + Math.min(0.85, alpha).toFixed(3) + ')';\n        ctx.beginPath(); ctx.arc(p.sx, p.sy, 1.1 + p.sc * 1.4, 0, Math.PI * 2); ctx.fill();\n      }\n      this._raf = requestAnimationFrame(tick);\n    };\n    tick();\n  }\n\n  renderVals() {\n    const ticker = ['FREE FOREVER', 'CERTIFICATE INCLUDED', 'NO SIGNUP', 'HANDS-ON AI LABS', 'BUILT BY A UNIVERSITY SCIENTIST', 'A NEW COURSE EVERY WEEK', 'FOUNDING COHORT OPEN'];\n    return {\n      canvasRef: this.canvasRef,\n      heroRef: this.heroRef,\n      progressRef: this.progressRef,\n      particlesOn: this.props.particles ?? true,\n      grainOn: this.props.filmGrain ?? true,\n      tickerTwice: ticker.concat(ticker),\n      outcomes: [\n        { n: 1, title: 'Explain AI in one sentence', body: 'And never mix up AI, machine learning, deep learning, and generative AI again.' },\n        { n: 2, title: 'See inside the machine', body: 'Tokens, weights, attention, and context windows, felt with your own hands in our live playground.' },\n        { n: 3, title: 'Know how models are trained', body: 'From a mountain of text to a helpful assistant, and why AI confidently makes things up.' },\n        { n: 4, title: 'Navigate the 2026 landscape', body: 'GPT, Claude, Gemini, Llama, DeepSeek, and the open-weights wave: who makes what, verified July 2026.' },\n        { n: 5, title: 'Pick the right AI for every job', body: 'Writing, coding, research, images, video, privacy: a cheat sheet you will use weekly.' },\n        { n: 6, title: 'Use AI like a professional', body: 'The five golden rules, the four-move prompt formula, and a certificate to show for it.' }\n      ],\n      steps: [\n        { n: '1', title: 'Learn', sub: 'video or slides', delay: '0s' },\n        { n: '2', title: 'Practice', sub: 'flashcards + AI labs', delay: '.6s' },\n        { n: '3', title: 'Prove it', sub: '20-question quiz', delay: '1.2s' },\n        { n: '4', title: 'Certificate', sub: 'add to LinkedIn in 2 clicks', delay: '1.8s' }\n      ],\n      faqs: [\n        { q: \"Is it really free? What's the catch?\", a: 'Really free, no catch. No account, no email capture, no upsell at the end. The Academy is a public-education project of Cambium AI Research Institution; the whole course runs on free, open infrastructure. If you want to pay us back, share your certificate and bring a friend.' },\n        { q: 'Do I need a technical background?', a: 'No. If you can use a web browser, you are qualified. No math, no code; every technical term arrives with a one-line plain-English meaning.' },\n        { q: 'How long does it take?', a: 'About 90 minutes total: a 17-minute lecture, hands-on labs, flashcards, and a 20-question quiz. Self-paced; your progress is saved in your browser.' },\n        { q: 'Is the certificate legitimate for LinkedIn?', a: 'Yes. It is an honor-based certificate of completion, like most free online courses offer, added to your LinkedIn profile in two clicks with Cambium AI Research Institution as issuer, and every certificate ID is checkable on our public verification page. It certifies you passed a locked, studied-for quiz; it does not claim to be an accredited degree, and we say so plainly.' },\n        { q: 'Why should I trust the content?', a: 'Every model name, statistic, and claim is a dated July 2026 snapshot, researched live with 48 cited sources, and every external link was verified by hand. When the landscape shifts, the course gets refreshed.' },\n        { q: 'What comes after this course?', a: 'A new course every week: prompting, research with AI, AI agents, running models locally, and more. Finish all 12 and the Cambium AI Fundamentals specialization certificate caps the track.' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
