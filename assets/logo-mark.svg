<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Cambium mark">
  <defs>
    <radialGradient id="cm-bg" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#0E3326"/>
      <stop offset="100%" stop-color="#07231A"/>
    </radialGradient>
    <radialGradient id="cm-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAFFC9"/>
      <stop offset="45%" stop-color="#B7F36A"/>
      <stop offset="100%" stop-color="#B7F36A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- substrate -->
  <rect x="4" y="4" width="192" height="192" rx="42" fill="url(#cm-bg)"/>
  <rect x="4.5" y="4.5" width="191" height="191" rx="41.5" fill="none" stroke="#1F4D3B" stroke-width="1"/>

  <!-- concentric growth rings -->
  <g fill="none" stroke="#16C079" stroke-linecap="round">
    <circle cx="100" cy="100" r="22"  stroke-width="2"   opacity="0.55"/>
    <circle cx="100" cy="100" r="36"  stroke-width="1.8" opacity="0.7"/>
    <circle cx="100" cy="100" r="50"  stroke-width="1.6" opacity="0.85"/>
    <circle cx="100" cy="100" r="64"  stroke-width="1.5"/>
  </g>

  <!-- emerald-deep faint underlay ring for depth -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#0E8E5B" stroke-width="1.5" opacity="0.35"/>

  <!-- radial spoke from center to active node (up-right, -45deg) -->
  <line x1="100" y1="100" x2="145.25" y2="54.75" stroke="#16C079" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>

  <!-- center dot -->
  <circle cx="100" cy="100" r="4.5" fill="#16C079"/>

  <!-- active growth node on outer ring (r=64 at -45deg) -->
  <circle cx="145.25" cy="54.75" r="16" fill="url(#cm-node)"/>
  <circle cx="145.25" cy="54.75" r="6.5" fill="#B7F36A"/>
  <circle cx="145.25" cy="54.75" r="2.6" fill="#052015"/>
</svg>
