<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The Cambium run board: named agents working across councils, a leaderboard, and the next human gate.">
  <defs>
    <linearGradient id="rbbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0b2c20"/><stop offset="100%" stop-color="#07231a"/></linearGradient>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0E3326"/><stop offset="100%" stop-color="#0a261c"/></linearGradient>
  </defs>
  <rect width="1120" height="660" rx="20" fill="url(#rbbg)"/>
  <rect x="1" y="1" width="1118" height="658" rx="19" fill="none" stroke="#1F4D3B"/>

  <!-- header -->
  <rect x="24" y="24" width="1072" height="92" rx="14" fill="url(#hd)" stroke="#1F4D3B"/>
  <g transform="translate(50,52)">
    <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="#0E3326" stroke="#16C079" stroke-width="2"/>
    <path d="M6 -7 A 9 9 0 1 0 6 7" fill="none" stroke="#16C079" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <text x="82" y="50" font-size="20" font-weight="800" fill="#eafaf0">CAMBIUM INSTITUTE <tspan font-size="13" font-weight="500" fill="#8AA197">· the Cambium way</tspan></text>
  <text x="82" y="74" font-size="13.5" fill="#cfe4d9">Request:  add useful skills to Cambium for math, stats, ML</text>
  <text x="82" y="98" font-size="12.5" fill="#8AA197">research workflow  ·  27 specialists  ·  7 councils  ·  3 human gates</text>
  <text x="1072" y="98" text-anchor="end" font-size="13" font-weight="700" fill="#16C079">the plan, before any work</text>

  <!-- phase rail -->
  <g transform="translate(40,150)" font-size="12.5">
    <g>
      <rect x="0" y="0" width="92" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#5b6f66"/><text x="34" y="19" fill="#cfe4d9">Support</text>
    </g>
    <text x="104" y="20" fill="#3a6e57" font-size="13">◆</text>
    <g transform="translate(122,0)">
      <rect x="0" y="0" width="82" height="30" rx="15" fill="rgba(22,192,121,.13)" stroke="#16C079"/><circle cx="16" cy="15" r="4" fill="#16C079"/><text x="32" y="19" fill="#eafaf0" font-weight="600">Scouts</text>
    </g>
    <g transform="translate(214,0)"><rect width="66" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#3a6e57"/><text x="30" y="19" fill="#9aa9a1">Labs</text></g>
    <g transform="translate(290,0)"><rect width="96" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#3a6e57"/><text x="30" y="19" fill="#9aa9a1">Execution</text></g>
    <g transform="translate(396,0)"><rect width="104" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#3a6e57"/><text x="30" y="19" fill="#9aa9a1">Verification</text></g>
    <text x="512" y="20" fill="#3a6e57" font-size="13">◆</text>
    <g transform="translate(530,0)"><rect width="84" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#3a6e57"/><text x="30" y="19" fill="#9aa9a1">Support</text></g>
    <g transform="translate(624,0)"><rect width="84" height="30" rx="15" fill="#0E3326" stroke="#1F4D3B"/><circle cx="16" cy="15" r="4" fill="#3a6e57"/><text x="30" y="19" fill="#9aa9a1">Support</text></g>
  </g>

  <!-- active phase card -->
  <rect x="40" y="208" width="690" height="280" rx="14" fill="#0c2c20" stroke="#1F4D3B"/>
  <text x="64" y="244" font-size="16" font-weight="700" fill="#eafaf0">▶ PHASE 2 · SCOUTS</text>

  <g>
    <rect x="64" y="262" width="642" height="58" rx="11" fill="#10392a" stroke="#1F4D3B"/>
    <circle cx="92" cy="291" r="13" fill="#16C079"/><text x="92" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#06140e">✓</text>
    <text x="118" y="286" font-size="14.5" font-weight="600" fill="#eafaf0">Scouts · Prior Art</text>
    <text x="118" y="306" font-size="12" fill="#8aa197" font-family="ui-monospace,monospace">cambium-institute:scout-prior-art</text>
    <text x="690" y="296" text-anchor="end" font-size="12" font-weight="600" fill="#16C079">done</text>
  </g>
  <g>
    <rect x="64" y="328" width="642" height="58" rx="11" fill="#10392a" stroke="#16C079"/>
    <circle cx="92" cy="357" r="13" fill="#15402F" stroke="#16C079"/><text x="92" y="362" text-anchor="middle" font-size="12" fill="#16C079">▶</text>
    <text x="118" y="352" font-size="14.5" font-weight="600" fill="#eafaf0">Scouts · Methods</text>
    <text x="118" y="372" font-size="12" fill="#8aa197" font-family="ui-monospace,monospace">cambium-institute:scout-methods</text>
    <text x="690" y="362" text-anchor="end" font-size="12" font-weight="600" fill="#E0B24A">working</text>
  </g>
  <g>
    <rect x="64" y="394" width="642" height="58" rx="11" fill="#0c2c20" stroke="#1F4D3B"/>
    <circle cx="92" cy="423" r="13" fill="none" stroke="#3a6e57"/>
    <text x="118" y="418" font-size="14.5" font-weight="600" fill="#cfe4d9">Scouts · Landscape</text>
    <text x="118" y="438" font-size="12" fill="#8aa197" font-family="ui-monospace,monospace">cambium-institute:scout-landscape</text>
    <text x="690" y="428" text-anchor="end" font-size="12" font-weight="500" fill="#8aa197">queued</text>
  </g>

  <!-- leaderboard -->
  <rect x="746" y="208" width="334" height="150" rx="14" fill="#0E3326" stroke="#1F4D3B"/>
  <text x="770" y="236" font-size="12" letter-spacing="1" fill="#8aa197">LEADERBOARD</text>
  <g font-size="13.5" fill="#cfe4d9">
    <text x="770" y="266"><tspan font-weight="800" fill="#16C079">92</tspan>   Scouts · Landscape</text>
    <text x="770" y="292"><tspan font-weight="800" fill="#16C079">88</tspan>   Scouts · Methods</text>
    <text x="770" y="318"><tspan font-weight="800" fill="#9fe3c2">85</tspan>   Verification · Rigor</text>
    <text x="770" y="344"><tspan font-weight="800" fill="#9fe3c2">80</tspan>   Scouts · Prior Art</text>
  </g>

  <!-- next gate -->
  <rect x="746" y="372" width="334" height="116" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.5"/>
  <text x="770" y="400" font-size="12" letter-spacing="1" fill="#16C079">⛩ NEXT GATE</text>
  <text x="770" y="428" font-size="15.5" font-weight="700" fill="#eafaf0">G-provision — checkpoint</text>
  <text x="770" y="456" font-size="12.5" fill="#bfe0d0">Nothing finalizes without your</text>
  <text x="770" y="474" font-size="12.5" font-weight="700" fill="#16C079">APPROVE.</text>

  <!-- legend -->
  <g transform="translate(40,520)" font-size="12.5" fill="#8aa197">
    <text x="0" y="0"><tspan fill="#16C079" font-weight="700">✓</tspan> done</text>
    <text x="92" y="0"><tspan fill="#E0B24A" font-weight="700">▶</tspan> now</text>
    <text x="172" y="0"><tspan fill="#3a6e57">○</tspan> waiting</text>
    <text x="272" y="0"><tspan fill="#3a6e57">◆</tspan> human gate</text>
    <text x="1040" y="0" text-anchor="end" fill="#6f8a7e">live · agent_outputs/run_state.json</text>
  </g>
</svg>
