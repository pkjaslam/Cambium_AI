# Copy to config.yml and edit for your lab. Titles are yours to choose.
institute:
  name: "Social-Science Survey Research Lab"
  director: "Dr. A. Survey (PI)"

model_profile: smart-tier           # smart-tier | opus-max | lean

# --- your team (add/remove people; a small lab can collapse roles) ---
team:
  - name: "Dr. Lab Head"
    role: director                  # approves top gates (submit, publish, budget)
  - name: "Dr. Co-PI A"
    role: co-pi
    aims: [1]                       # human-in-the-loop for Aim 1
  - name: "Dr. Co-PI B"
    role: co-pi
    aims: [2, 3]                    # human-in-the-loop for Aims 2 and 3
  - name: "PM Name"
    role: project-manager           # operations; no scientific approval
  - name: "Postdoc Name"
    role: researcher
    aims: [1]
  - name: "Student Name"
    role: student
    aims: [2]
  - name: "Eng Name"
    role: engineer

# --- which role approves which gate (delegated human-in-the-loop) ---
gate_approvers:
  G1_pursue_rfp: director
  G2_pick_idea: director            # relevant co-pis consulted
  G3a_contact: director
  G3_submit_proposal: director      # only
  G4_apply_fixes: area-lead         # the Co-PI who owns that workstream
  G5_release_report: director-or-area-lead
  G6_publish: director              # only; all co-authors sign the AI Use Statement

gates:
  human_in_the_loop: true
  separation_of_duties: true        # author != sole approver; releases need a 2nd human

protected_files:
  - "PROJECT_STATE.md"

faculty_disciplines:                # standing chairs to summon (extensible)
  - statistics
  - machine-learning
  - your-domain

# --- model router: which AI model runs each job (Claude now; add others later) ---
model_router:
  active_provider: anthropic          # the provider used right now
  providers:
    anthropic:                        # ON — works out of the box
      enabled: true
      tiers:
        strong: claude-opus-4-8                 # critical path: theory, stats, audit, referee, conduct, final writing
        mid:    claude-sonnet-4-6               # breadth: scouts, labs, execution, pre-award, reporting
        light:  claude-haiku-4-5-20251001       # bulk: cleanup, formatting, digests
    google:                           # OFF — fill in + flip enabled when you have access
      enabled: false
      api_key_env: GEMINI_API_KEY
      tiers: { strong: "", mid: "", light: "" }
    openai_compatible:                # OFF — for free / other models via an OpenAI-style endpoint
      enabled: false
      base_url: ""                    # e.g. a local or free API endpoint
      api_key_env: OPENAI_API_KEY
      tiers: { strong: "", mid: "", light: "" }
  task_tiers:                         # each job class -> a tier above
    critical: strong
    standard: mid
    bulk: light

# --- Domain preset: social-science survey research ---
# faculty disciplines to spin up on demand for this field:
#   survey-methodology, psychometrics, causal-inference, qualitative-coding, research-ethics (IRB/FERPA)
# notes: human-subjects IRB gate precedes data work; consent + de-identification required (see RESEARCH_CONDUCT.md).
