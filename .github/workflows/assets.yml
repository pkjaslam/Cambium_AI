# CI: Cambium - keep the static run-board PNG fresh.
#
# assets/run_board.png is regenerated from tools/gen_board_image.py when the roster or router changes.
# assets/run_board.gif (the animated README demo) is intentionally NOT touched here: it is a committed
# artifact owned by assets/gen/gen_runboard_gif.py in the v1.39 live-board style (Up-next collapse,
# streaming findings, top decision bar), regenerated only by hand so GitHub always shows exactly the
# committed version and no push or CI run can re-render it with different fonts. Commits the PNG only
# if it actually changed.

name: Refresh run-board PNG

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tools/gen_board_image.py"
      - "tools/run_trace.py"
      - "tools/task_router.py"
      - "agent_cards.json"

permissions:
  contents: write

jobs:
  render:
    name: Render board PNG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install render deps
        run: pip install pillow imageio

      - name: Regenerate run-board PNG
        run: python3 tools/gen_board_image.py

      - name: Commit refreshed PNG (only if changed)
        run: |
          if [ -n "$(git status --porcelain assets/run_board.png)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/run_board.png
            git commit -m "chore(assets): refresh run-board PNG [skip ci]"
            git push
          else
            echo "run-board PNG already up to date."
          fi
