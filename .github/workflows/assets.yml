# CI: Cambium — keep the run-board imagery fresh
#
# assets/run_board.png comes from tools/gen_board_image.py; assets/run_board.gif is the README-quality
# demo and comes from assets/gen/gen_runboard_gif.py (the v1.39 live-board style: Up-next collapse,
# streaming findings, top decision bar). Both generators historically wrote the GIF, so the canonical
# generator runs LAST and wins. Runs on every published release and on demand; commits refreshed assets
# only if they actually changed.

name: Refresh run-board assets

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tools/gen_board_image.py"
      - "assets/gen/gen_runboard_gif.py"
      - "tools/run_trace.py"
      - "tools/task_router.py"
      - "agent_cards.json"

permissions:
  contents: write

jobs:
  render:
    name: Render board PNG + GIF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install render deps
        run: pip install pillow imageio

      - name: Regenerate run-board imagery
        run: |
          python3 tools/gen_board_image.py
          python3 assets/gen/gen_runboard_gif.py

      - name: Commit refreshed assets (only if changed)
        run: |
          if [ -n "$(git status --porcelain assets/run_board.png assets/run_board.gif)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/run_board.png assets/run_board.gif
            git commit -m "chore(assets): refresh run-board imagery [skip ci]"
            git push
          else
            echo "run-board assets already up to date."
          fi
