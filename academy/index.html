<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambium Academy, learn responsible AI research by doing</title>
<meta name="description" content="Active recall and spaced practice across sessions, plus learning by doing. Five short courses for students, researchers, and faculty.">
<style>
:root{
 --bg:#07231A; --panel:#0E3326; --panel2:#15402F; --ink:#F4F7F2; --mut:#8AA197;
 --gold:#16C079; --gold2:#19C0A6; --line:#1F4D3B; --good:#16C079; --warn:#E0B24A; --bad:#FF6B5E;
 --r:14px; --sh:0 10px 30px rgba(0,0,0,.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:radial-gradient(1200px 700px at 80% -10%,#0c3526 0,var(--bg) 55%);color:var(--ink);
 font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;min-height:100vh}
a{color:var(--gold2)}
.mono{font-family:ui-monospace,"Cascadia Code",monospace}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
/* sidebar */
.side{background:linear-gradient(180deg,#0b2c20,#0a261c);border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;color:#eafaf0}
.brand .hex{color:var(--gold);font-size:19px}
.brand small{display:block;color:var(--mut);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.ov{margin:16px 0 8px;background:rgba(22,192,121,.08);border:1px solid var(--line);border-radius:12px;padding:12px}
.ov .bar{height:8px;border-radius:99px;background:#0a1f17;overflow:hidden;margin-top:8px}
.ov .bar>span{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.ov .pct{font-size:12px;color:var(--mut);display:flex;justify-content:space-between;margin-top:7px}
.mod{margin-top:14px}
.mod>h4{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin:0 0 4px;display:flex;align-items:center;gap:7px}
.mbadge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid var(--line);color:var(--mut)}
.mbadge.master{color:#06140e;background:var(--gold);border-color:var(--gold);font-weight:700}
.mpills{display:flex;flex-wrap:wrap;gap:4px;margin:0 0 5px}
.mpill{font-size:9px;padding:2px 7px;border-radius:99px;background:rgba(22,192,121,.07);border:1px solid var(--line);color:var(--mut);letter-spacing:.02em}
.mpill.tier{background:rgba(25,192,166,.1);border-color:var(--gold2);color:var(--gold2)}
.lnav{list-style:none;display:flex;flex-direction:column;gap:3px}
.lnav li{padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13.5px;color:#cfe4d9;display:flex;align-items:center;gap:9px;border:1px solid transparent;transition:.15s}
.lnav li:hover{background:rgba(255,255,255,.03);border-color:var(--line)}
.lnav li.active{background:rgba(22,192,121,.13);border-color:var(--gold);color:#eafaf0;font-weight:600}
.lnav li .tick{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line);flex:0 0 auto;display:grid;place-items:center;font-size:10px;color:transparent}
.lnav li.done .tick{background:var(--gold);border-color:var(--gold);color:#06140e}
/* main */
.main{padding:36px 40px 90px;max-width:880px}
.crumb{color:var(--mut);font-size:12.5px;letter-spacing:.03em;text-transform:uppercase}
h1.lt{font-size:30px;line-height:1.18;margin:6px 0 4px;letter-spacing:-.02em}
.lsub{color:var(--mut);font-size:15px;margin-bottom:8px}
.howto{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 26px}
.howto span{font-size:11.5px;color:#bfe0d0;background:rgba(22,192,121,.08);border:1px solid var(--line);padding:4px 10px;border-radius:99px}
.block{background:linear-gradient(180deg,var(--panel),#0c2c20);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;margin:0 0 20px;box-shadow:var(--sh)}
.block .kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.block h3{font-size:19px;margin:0 0 8px;letter-spacing:-.01em}
.block p{margin:0 0 10px;color:#dcebe3}
.block p:last-child{margin-bottom:0}
.block .why{color:var(--mut);font-size:12.5px;font-style:italic;margin-top:8px}
.tbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:13.5px}
.tbl th,.tbl td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
.tbl th{background:rgba(255,255,255,.03);color:#bfe0d0;font-weight:600}
/* MCQ predict */
.choices{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.choice{text-align:left;background:#0c2920;border:1px solid var(--line);color:var(--ink);padding:12px 14px;border-radius:11px;cursor:pointer;font-size:14px;transition:.15s;display:flex;gap:10px;align-items:flex-start}
.choice:hover{border-color:var(--gold2);background:#0f3327}
.choice .ix{width:22px;height:22px;border-radius:6px;background:#0a1f17;border:1px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:700;flex:0 0 auto;color:var(--mut)}
.choice.correct{border-color:var(--good);background:rgba(22,192,121,.13)}
.choice.correct .ix{background:var(--good);color:#06140e;border-color:var(--good)}
.choice.wrong{border-color:var(--bad);background:rgba(255,107,94,.1)}
.choice.wrong .ix{background:var(--bad);color:#1a0b09;border-color:var(--bad)}
.choice:disabled{cursor:default;opacity:.92}
.fb{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13.5px;display:none}
.fb.show{display:block}
.fb.ok{background:rgba(22,192,121,.1);border:1px solid var(--good)}
.fb.no{background:rgba(224,178,74,.1);border:1px solid var(--warn)}
/* reveal / explain */
textarea.in{width:100%;min-height:84px;background:#0a1f17;border:1px solid var(--line);border-radius:10px;color:var(--ink);
 padding:12px 14px;font-size:14px;font-family:inherit;resize:vertical}
textarea.in:focus{outline:none;border-color:var(--gold2)}
.btn{background:var(--gold);color:#06140e;border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s}
.btn:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--gold2)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
.model{margin-top:14px;padding:14px 16px;border-radius:10px;background:rgba(22,192,121,.07);border:1px dashed var(--line);display:none}
.model.show{display:block}
.model h5{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold2);margin-bottom:6px}
.rate{display:flex;gap:8px;margin-top:12px}
.rate button{flex:1;border:1px solid var(--line);background:#0c2920;color:#cfe4d9;border-radius:9px;padding:8px;font-size:12.5px;cursor:pointer}
.rate button:hover{border-color:var(--gold2)}
.rate button.sel{border-color:var(--gold);background:rgba(22,192,121,.14);color:#eafaf0}
/* flashcards */
.deck{display:flex;flex-direction:column;align-items:center;gap:8px}
.card{width:100%;max-width:520px;height:200px;perspective:1200px;cursor:pointer}
.card .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.card.flip .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;border:1px solid var(--line);
 display:grid;place-items:center;text-align:center;padding:24px;font-size:17px;background:linear-gradient(160deg,#10392a,#0c2c20)}
.face.back{transform:rotateY(180deg);background:linear-gradient(160deg,#123c2c,#0e3325);font-size:15px;color:#dcebe3}
.face .tag{position:absolute;top:12px;left:14px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut)}
.deckbar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:520px;font-size:12.5px;color:var(--mut)}
.card-due-note{font-size:11.5px;color:var(--gold2);background:rgba(25,192,166,.08);border:1px solid var(--line);border-radius:8px;padding:5px 10px;text-align:center;width:100%;max-width:520px}
.spacing-banner{font-size:12px;color:var(--mut);background:rgba(22,192,121,.06);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:8px;width:100%;max-width:520px;text-align:center}
/* diagram */
.diagram{position:relative}
.diagram svg{width:100%;height:auto;display:block;background:#0a1f17;border-radius:12px;border:1px solid var(--line)}
.node rect{fill:#103a2a;stroke:var(--line);stroke-width:1.5;rx:9;cursor:pointer;transition:.15s}
.node:hover rect,.node.sel rect{fill:#16523a;stroke:var(--gold)}
.node text{fill:#eafaf0;font-size:12px;font-weight:600;pointer-events:none}
.edge{stroke:#2a6048;stroke-width:1.6;marker-end:url(#arr)}
.ndesc{margin-top:12px;padding:12px 14px;border-radius:10px;background:#0c2920;border:1px solid var(--line);font-size:13.5px;min-height:44px;color:#dcebe3}
.ndesc b{color:var(--gold2)}
/* worked */
ol.steps{margin:6px 0 0 18px;padding:0}
ol.steps li{margin:0 0 7px;color:#dcebe3;font-size:14px}
.hintbox{margin-top:10px}
/* lesson footer */
.lfoot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px;flex-wrap:wrap}
.donebtn{background:var(--gold);color:#06140e;border:none;border-radius:10px;padding:11px 18px;font-weight:700;cursor:pointer}
.donebtn.is-done{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.nav2{display:flex;gap:8px}
/* quiz / mastery */
.quizwrap .qitem{margin-bottom:16px}
.quizwrap .qsource{font-size:11px;color:var(--mut);margin-bottom:4px;letter-spacing:.02em}
.mastercard{text-align:center;padding:30px}
.mastercard .big{font-size:40px}
.scorepill{display:inline-block;font-weight:800;font-size:15px;padding:6px 16px;border-radius:99px;margin-top:8px}
.scorepill.pass{background:var(--gold);color:#06140e}
.scorepill.fail{background:rgba(224,178,74,.15);border:1px solid var(--warn);color:var(--warn)}
/* go deeper resources */
.go-deeper{margin-top:22px;padding:18px 20px;border-radius:12px;background:rgba(22,192,121,.05);border:1px solid var(--line)}
.go-deeper h4{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}
.go-deeper .ext-note{font-size:11.5px;color:var(--mut);font-style:italic;margin-bottom:10px}
.go-deeper ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.go-deeper li{font-size:13px;color:#cfe4d9}
.go-deeper li .res-why{font-size:11.5px;color:var(--mut);margin-top:2px}
@media(max-width:840px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--line)}.main{padding:24px 18px 80px}}
</style>
</head>
<body>
<div class="app">
 <aside class="side">
  <div class="brand"><span class="hex">&#x2B22;</span><div>Cambium<small id="brandsub">Learning Lab</small></div></div>
  <div class="ov">
   <div style="font-size:12px;color:#bfe0d0;font-weight:600">Your progress</div>
   <div class="bar"><span id="ovbar"></span></div>
   <div class="pct"><span id="ovpct">0%</span><span id="ovmaster">0 mastered</span></div>
  </div>
  <nav id="nav"></nav>
  <button class="btn ghost" style="width:100%;margin-top:16px;font-size:12px" onclick="resetProgress()">Reset my progress</button>
 </aside>
 <main class="main" id="main"></main>
</div>
<script id="lab-data" type="application/json">{"id": "academy", "brand": "Academy", "title": "Cambium Academy, learn responsible AI research by doing", "subtitle": "Active recall and spaced practice across sessions, plus learning by doing. Five short courses for students, researchers, and faculty.", "modules": [{"id": "way", "title": "The Cambium way", "summary": "How a one-sentence goal becomes verified results.", "lessons": [{"id": "what", "title": "What Cambium actually is", "subtitle": "A research institution you run with one sentence.", "blocks": [{"type": "concept", "title": "One sentence in, a real research process out", "html": "<p>Cambium is a portable research institution. You give it a goal in plain language, and it runs the work the way a careful lab would: specialists do the work, a few do nothing but try to break it, and <b>you<\/b> approve the result before anything is final.<\/p><p>It is not one model answering fast. It is a structured process where the AI does the volume and you stay the person who understands and decides.<\/p>", "why": "The whole design exists to keep a human in charge of judgment while AI handles the labor."}, {"type": "concept", "title": "Three building blocks: agents, councils, gates", "html": "<p><b>Agents<\/b> are named specialists, each with one job (a statistician, a librarian, a referee). <b>Councils<\/b> are the teams they sit in (Labs, Verification, Reporting). <b>Gates<\/b> are the moments the work stops and waits for your decision.<\/p><p>Cambium ships with 46 agents across 11 councils and 8 gates. You never talk to all of them. The orchestrator picks the few a task needs.<\/p>"}, {"type": "flashcards", "cards": [{"front": "What is an agent in Cambium?", "back": "A named specialist with a single job, like a referee or a statistician."}, {"front": "What is a council?", "back": "A team of related agents, like Verification or Labs."}, {"front": "What is a gate?", "back": "A checkpoint where the run pauses and waits for your decision."}]}, {"type": "predict", "q": "You ask Cambium to 'analyze this dataset.' What happens first?", "choices": ["Every one of the 46 agents runs at once", "The orchestrator decomposes the goal and dispatches only the agents the task needs", "It writes the final report immediately", "It asks you to pick agents yourself"], "answer": 1, "explain": "The orchestrator is the chief of staff. It reads the goal, plans the phases, and calls only the specialists that fit. You are not expected to manage 46 agents."}, {"type": "explain", "prompt": "In your own words, what is the difference between Cambium and just asking one AI model a question?", "model": "<p>A single model gives you one fast answer with no checks. Cambium runs a process: specialists do the work, separate agents try to disprove it, and the result waits at a gate for your approval. You trade a little speed for verification and control.<\/p>"}]}, {"id": "loop", "title": "The core loop, end to end", "subtitle": "From request to a result you can trust.", "blocks": [{"type": "diagram", "caption": "How a run flows", "nodes": [{"id": "you", "label": "Your goal", "x": 2, "y": 40, "desc": "One plain-language sentence. No agent names, no config."}, {"id": "orch", "label": "Orchestrator", "x": 22, "y": 40, "desc": "Decomposes the goal, plans phases, and dispatches the right specialists."}, {"id": "work", "label": "Councils do the work", "x": 45, "y": 18, "desc": "Labs, Scouts, Execution and others produce the actual analysis, code, or draft."}, {"id": "verify", "label": "Verification", "x": 45, "y": 62, "desc": "Separate adversarial agents reproduce every number and try to break the logic."}, {"id": "gate", "label": "Gate (you decide)", "x": 70, "y": 40, "desc": "The run pauses. You approve, ask for revision, or reject. Nothing finalizes without you."}, {"id": "out", "label": "Verified result", "x": 92, "y": 40, "desc": "Only released after it passed verification and your approval."}], "edges": [["you", "orch"], ["orch", "work"], ["orch", "verify"], ["work", "gate"], ["verify", "gate"], ["gate", "out"]]}, {"type": "concept", "title": "Why the loop is shaped this way", "html": "<p>Notice that verification is a separate path, not the same agents checking their own work. That is deliberate. People and models are both bad at finding their own mistakes, so Cambium gives that job to a different team whose only incentive is to find problems.<\/p>"}, {"type": "predict", "q": "Who reproduces the headline numbers in a run?", "choices": ["The same agent that produced them", "A separate verification council that re-runs the code", "Nobody, the model is trusted", "You, by hand"], "answer": 1, "explain": "Verification is independent on purpose. The agents who built the result do not get to be the ones who bless it."}, {"type": "worked", "title": "Trace a tiny run", "steps": ["Goal: 'check whether group A and group B differ on score.'", "Orchestrator plans: provision data, run the test, verify, report.", "A statistics agent runs the test and reports a p-value and effect size.", "A verification agent re-runs it from the raw data and confirms the number.", "The run pauses at a gate with the result and its evidence tier.", "You approve, and only then is the finding written into the report."], "yourturn": {"prompt": "Where in those six steps could a wrong result still get caught before it reaches you?", "hint": "Think about which step exists only to catch mistakes.", "solution": "<p>Step 4, verification. It re-runs the analysis independently, so a coding slip or a leakage problem in step 3 gets caught before the gate. If it still slips through, the gate in step 5 is your last check.<\/p>"}}, {"type": "explain", "prompt": "Explain why Cambium separates 'doing the work' from 'checking the work.'", "model": "<p>Whoever does the work is invested in it being right and tends to miss their own errors. A separate checker has no such bias and is rewarded for finding problems, so independent verification catches far more than self-review.<\/p>"}]}], "quiz": [{"q": "What does the orchestrator do?", "choices": ["Writes the final paper", "Decomposes your goal and dispatches the right specialists", "Stores your data", "Approves the result"], "answer": 1, "explain": "It is the chief of staff that plans and dispatches. Approval is yours; final prose is the writing agents'."}, {"q": "Roughly how many agents and gates does Cambium ship with?", "choices": ["about 10 specialists and a couple of checkpoints", "46 specialists across 11 councils, with 8 human gates", "around 100 specialists and many checkpoints", "a single agent and one checkpoint"], "answer": 1, "explain": "46 agents across 11 councils, with 8 gates."}, {"q": "Why is verification a separate council?", "choices": ["To save money", "Because independent checkers catch what authors miss", "To run faster", "It is not separate"], "answer": 1, "explain": "Independent, adversarial checking beats self-review."}], "pillars": ["Research integrity", "Responsible-AI reasoning"], "tier": "Foundation", "resources": [{"title": "Responsible and Ethical AI", "org": "Coursera", "url": "https://www.coursera.org/learn/responsible-and-ethical-ai", "type": "course", "why": "Grounds the Cambium-way values in the broader responsible-AI landscape."}, {"title": "Recommendation on the Ethics of AI", "org": "UNESCO", "url": "https://www.unesco.org/en/artificial-intelligence/recommendation-ethics", "type": "guide", "why": "The global policy baseline that informs responsible-AI norms."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce the matching artifact in a real Learning Lab run (e.g. a gate record, a data inventory, a model info sheet)."}}, {"id": "evidence", "title": "Evidence tiers & honest claims", "summary": "Say exactly as much as the evidence supports, no more.", "lessons": [{"id": "tiers", "title": "The four-tier evidence contract", "subtitle": "Every claim carries a label for how well it is backed.", "blocks": [{"type": "concept", "title": "Four tiers, from strongest to weakest", "html": "<table class='tbl'><tr><th>Tier<\/th><th>Means<\/th><th>Example<\/th><\/tr><tr><td><b>Proved<\/b><\/td><td>Established by a proof or definition<\/td><td>A mathematical bound that always holds<\/td><\/tr><tr><td><b>Code-verified<\/b><\/td><td>Reproduced by re-running the code from raw inputs<\/td><td>An accuracy number a second agent regenerated<\/td><\/tr><tr><td><b>Asserted<\/b><\/td><td>Claimed by a source or model but not independently checked<\/td><td>A figure quoted from a paper<\/td><\/tr><tr><td><b>Open<\/b><\/td><td>Unknown, untested, or unresolved<\/td><td>A hypothesis you have not run yet<\/td><\/tr><\/table><p>Nothing in a Cambium deliverable is allowed to claim a higher tier than its evidence supports.<\/p>", "why": "The tiers exist so a reader knows instantly whether to trust a sentence or treat it as a lead."}, {"type": "flashcards", "cards": [{"front": "Proved", "back": "Backed by a proof or definition. The strongest tier."}, {"front": "Code-verified", "back": "Reproduced by re-running the code from raw inputs."}, {"front": "Asserted", "back": "Stated by a source or model, not independently checked."}, {"front": "Open", "back": "Untested or unresolved. An honest 'we don't know yet.'"}]}, {"type": "predict", "q": "A model says 'our method reaches 94% accuracy,' but no agent has re-run the code. What tier is that?", "choices": ["Proved", "Code-verified", "Asserted", "Open"], "answer": 2, "explain": "It is Asserted. Until a verification agent reproduces the 94% from the raw data, it stays a claim, not a verified fact."}, {"type": "explain", "prompt": "Why is it dangerous to let an 'Asserted' number be reported as if it were 'Code-verified'?", "model": "<p>Because readers act on the label. If an unchecked number is dressed up as verified, people build decisions on something that might be a bug, a leak, or a hallucination. The tier is a promise about how much checking happened.<\/p>"}]}, {"id": "overclaim", "title": "Spotting an overclaim", "subtitle": "The most common way honest work goes wrong.", "blocks": [{"type": "concept", "title": "An overclaim is a sentence richer than its evidence", "html": "<p>Overclaiming is not lying. It is the quiet drift from 'in our test, X' to 'X,' or from 'this suggests' to 'this proves.' Cambium has an integrity officer whose entire job is to catch claims that have outrun their tier.<\/p>"}, {"type": "worked", "title": "Tighten three overclaims", "steps": ["'Our model proves that diet causes the outcome.' &rarr; observational data cannot prove cause. Say 'is associated with.'", "'This always works.' &rarr; tested on one dataset. Say 'worked on the data we tried.'", "'State-of-the-art.' &rarr; only if measured against current baselines, fairly. Otherwise drop it."], "yourturn": {"prompt": "Rewrite this honestly: 'Our system is 100% accurate and ready for clinical use.'", "hint": "Two separate overclaims hide in there: the number and the readiness.", "solution": "<p>Something like: 'On our held-out test set the system was correct on every case we tried (code-verified). It has not been tested prospectively or in a clinical setting, so it is not ready for clinical use.' The number is tied to a context, and the readiness claim is withdrawn.<\/p>"}}, {"type": "predict", "q": "Which sentence is honest about its evidence?", "choices": ["'This treatment cures the disease.'", "'In a 200-patient trial, the treatment reduced symptoms versus placebo (p<0.01).'", "'Everyone improves on this treatment.'", "'This is the best treatment available.'"], "answer": 1, "explain": "It names the context, the comparison, and the strength. The others claim more than any single study can support."}, {"type": "explain", "prompt": "Describe overclaiming to a new student in one or two sentences.", "model": "<p>Overclaiming is when a statement says more than the evidence behind it actually shows, like turning 'it worked once' into 'it always works.' The fix is to tie every claim to the exact evidence and context it came from.<\/p>"}]}], "quiz": [{"q": "A figure quoted from a paper but not re-run is which tier?", "choices": ["Proved", "Code-verified", "Asserted", "Open"], "answer": 2, "explain": "Asserted: stated by a source, not independently reproduced."}, {"q": "What makes a claim an overclaim?", "choices": ["It uses big words", "It says more than its evidence supports", "It is too short", "It cites a source"], "answer": 1, "explain": "Overclaiming is drift beyond the evidence tier."}, {"q": "'Code-verified' means:", "choices": ["A model is confident", "Code exists somewhere", "An independent agent reproduced the number from raw inputs", "It compiled"], "answer": 2, "explain": "Reproduction from raw inputs by an independent check is the bar."}], "pillars": ["Research integrity", "Responsible-AI reasoning"], "tier": "Foundation", "resources": [{"title": "Generative AI for Students: Ethics and Academic Integrity", "org": "Coursera", "url": "https://www.coursera.org/learn/generative-ai-for-students-ethics-and-academic-integrity", "type": "course", "why": "Covers AI-era academic integrity, directly relevant to honest evidence claims."}, {"title": "Leakage and the Reproducibility Crisis in ML-based science", "org": "Princeton (Kapoor & Narayanan)", "url": "https://reproducible.cs.princeton.edu/", "type": "guide", "why": "Shows how unchecked claims become overoptimistic results, the exact failure honest evidence tiers guard against."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce the matching artifact in a real Learning Lab run (e.g. a gate record, a data inventory, a model info sheet)."}}, {"id": "gates", "title": "Why a human gate beats autonomy", "summary": "The case for stopping and asking a person.", "lessons": [{"id": "why", "title": "What a gate is, and why it is there", "subtitle": "The deliberate friction that keeps you in control.", "blocks": [{"type": "concept", "title": "A gate is a stop-and-decide checkpoint", "html": "<p>At a gate the run halts and shows you what it has, the evidence behind it, and a clear choice: <b>approve<\/b>, <b>revise<\/b>, or <b>reject<\/b>. Nothing irreversible happens until you choose. Cambium has 8 such gates across the lifecycle, from picking which funding call to chase, to releasing a final report.<\/p>", "why": "Full autonomy is faster, but it removes the one safeguard that matters most when the work feeds a real decision: a human who can say no."}, {"type": "flashcards", "cards": [{"front": "Approve", "back": "Accept the result and let the run continue."}, {"front": "Revise", "back": "Send it back with feedback for another pass."}, {"front": "Reject", "back": "Stop this direction. It is not good enough."}]}, {"type": "predict", "q": "Why not just let Cambium run fully autonomously to save your time?", "choices": ["Autonomy is technically impossible", "Because a human gate is the safeguard that catches bad calls before they cause harm", "Gates make it run faster", "There is no reason"], "answer": 1, "explain": "Speed is not the goal when the output feeds a grant, a paper, or a clinical decision. The gate is where a person can stop a confident mistake."}, {"type": "explain", "prompt": "Explain to a colleague why removing the gates would make Cambium less trustworthy, not more.", "model": "<p>The gates are where human judgment enters. Remove them and you get fast output that nobody vetted, so a confident error sails straight into a real decision. The friction is the feature: it guarantees a person reviewed the work before it counted.<\/p>"}]}, {"id": "decide", "title": "Making a good gate decision", "subtitle": "How to actually use the three buttons well.", "blocks": [{"type": "worked", "title": "Read a gate like a reviewer", "steps": ["Check the evidence tier on each claim. Is anything important only 'Asserted'?", "Look at what verification said. Did every headline number reproduce?", "Ask if the result answers your actual question, not a nearby easier one.", "If yes to all, approve. If close, revise with specific feedback. If the direction is wrong, reject."], "yourturn": {"prompt": "At a gate you see a strong result, but one key number is tier 'Asserted' and was never re-run. What do you do?", "hint": "An unverified key number is exactly what 'revise' is for.", "solution": "<p>Revise, not approve. Send it back asking verification to reproduce that number from the raw data. Approving would let an unchecked figure into the final work with a verified-looking stamp.<\/p>"}}, {"type": "predict", "q": "Feedback at a gate is most useful when it is:", "choices": ["A thumbs up or down only", "Specific and pointed at what to change", "Withheld until the end", "About tone, not substance"], "answer": 1, "explain": "Cambium routes your feedback to the right agent. 'Re-run number 3 from raw data' is actionable; 'make it better' is not."}, {"type": "explain", "prompt": "In your own words, when should you reject at a gate rather than revise?", "model": "<p>Reject when the whole direction is wrong, the question being answered is not the one you care about, or the approach is unsalvageable. Revise when the direction is right but something specific needs fixing. Reject kills the path; revise corrects it.<\/p>"}]}], "quiz": [{"q": "At a gate, what are your three choices?", "choices": ["Yes/No/Maybe", "Approve/Revise/Reject", "Save/Delete/Share", "Fast/Slow/Stop"], "answer": 1, "explain": "Approve, revise, or reject."}, {"q": "The main reason gates exist:", "choices": ["To slow you down for its own sake", "To keep a human in control of consequential decisions", "To use more agents", "To store data"], "answer": 1, "explain": "Human-in-the-loop control over consequential output."}, {"q": "A key number is unverified at the gate. Best move?", "choices": ["Approve and hope", "Reject the whole project", "Revise: send it back to be reproduced", "Ignore it"], "answer": 2, "explain": "Revise and have verification reproduce it before approval."}], "pillars": ["Responsible-AI reasoning"], "tier": "Foundation", "resources": [{"title": "Operationalising the SAFE-D principles / responsible AI overview", "org": "Alan Turing Institute", "url": "https://www.turing.ac.uk/", "type": "guide", "why": "Practical framing for human oversight and responsible AI governance."}, {"title": "UNESCO Recommendation on the Ethics of AI (human oversight)", "org": "UNESCO", "url": "https://www.unesco.org/en/artificial-intelligence/recommendation-ethics", "type": "guide", "why": "Principle 7, human oversight and determination, is the global-standard case for keeping a person in the loop."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce the matching artifact in a real Learning Lab run (e.g. a gate record, a data inventory, a model info sheet)."}}, {"id": "verify", "title": "Verifying without fooling yourself", "summary": "How to check a result so it actually holds.", "lessons": [{"id": "repro", "title": "Reproduce the number", "subtitle": "If you can't re-run it, you don't really have it.", "blocks": [{"type": "concept", "title": "Reproduction is the floor, not the ceiling", "html": "<p>The first verification question is simple: starting from the raw inputs, can a second, independent run produce the same headline number? If not, the result is not real yet. Cambium's verification council does exactly this before any number is allowed to be called code-verified.<\/p>"}, {"type": "predict", "q": "A result reproduces exactly when re-run. Does that make it correct?", "choices": ["Yes, reproduction proves correctness", "No, it proves consistency, the method could still be biased or leaky", "Only if it is fast", "Reproduction is irrelevant"], "answer": 1, "explain": "Reproduction rules out one big failure (a fluke or a slip), but a reproducible result built on a leaky split is reproducibly wrong. You still have to check the method."}, {"type": "flashcards", "cards": [{"front": "Reproducibility", "back": "Re-running from raw inputs gives the same number. Necessary, not sufficient."}, {"front": "Data leakage", "back": "Information from the test set sneaks into training, inflating results."}, {"front": "Unfair baseline", "back": "Comparing against a weak or mis-tuned alternative to look good."}]}, {"type": "explain", "prompt": "Why is 'it reproduced' necessary but not enough to trust a result?", "model": "<p>Reproduction shows the number is stable and not a one-off accident, but it says nothing about whether the method was sound. A flawed pipeline produces the same flawed number every time. You need to check for leakage, fair baselines, and valid assumptions too.<\/p>"}]}, {"id": "traps", "title": "The ways you fool yourself", "subtitle": "Leakage, weak baselines, and cherry-picking.", "blocks": [{"type": "diagram", "caption": "Three classic traps", "nodes": [{"id": "leak", "label": "Leakage", "x": 12, "y": 30, "desc": "Test information leaks into training, so the score is inflated and won't hold on new data."}, {"id": "base", "label": "Weak baseline", "x": 12, "y": 70, "desc": "You beat a strawman. Against a properly tuned alternative the gain shrinks or vanishes."}, {"id": "cherry", "label": "Cherry-picking", "x": 50, "y": 50, "desc": "Reporting the one seed, split, or metric that looks best and hiding the rest."}, {"id": "truth", "label": "Honest result", "x": 85, "y": 50, "desc": "Survives all three: clean split, fair comparison, all runs reported."}], "edges": [["leak", "truth"], ["base", "truth"], ["cherry", "truth"]]}, {"type": "worked", "title": "Catch the leak", "steps": ["A model predicts hospital readmission with 0.99 AUC. Suspiciously high.", "Verification inspects the features and finds 'discharge disposition' among them.", "That field is partly set after the outcome is known, so it leaks the answer.", "Remove it, re-run, and AUC drops to a believable 0.74.", "The honest result is 0.74, reported with the leak explained."], "yourturn": {"prompt": "A teammate reports 100% accuracy on a fraud detector. What is your first question?", "hint": "Near-perfect scores are usually a leak or a label artifact, not a breakthrough.", "solution": "<p>Ask what features it used and how the train/test split was made. Almost always one feature encodes the label, or the same transactions appear in both train and test. Genuine near-perfect accuracy is rare; leakage is common.<\/p>"}}, {"type": "predict", "q": "You beat the baseline by 5 points. What should you check before celebrating?", "choices": ["Nothing, you won", "Whether the baseline was fairly tuned and the split was clean", "The font of the chart", "How fast it ran only"], "answer": 1, "explain": "A 5-point win over a mis-tuned baseline or across a leaky split can evaporate. Fair comparison and clean splits come before the victory lap."}, {"type": "explain", "prompt": "Explain data leakage to someone new, with a one-line example.", "model": "<p>Leakage is when information that wouldn't be available at prediction time slips into training, so the model looks great in testing but fails in the real world. Example: including a 'was_readmitted' related field as an input when predicting readmission.<\/p>"}]}], "quiz": [{"q": "Reproducing a number proves it is:", "choices": ["Correct", "Consistent, but not necessarily correct", "Fast", "Published"], "answer": 1, "explain": "Consistency, not correctness. Method flaws reproduce too."}, {"q": "A 0.99 AUC on a messy real-world task usually signals:", "choices": ["Genius", "Likely data leakage", "A slow model", "Nothing"], "answer": 1, "explain": "Suspiciously high scores are usually leakage or a label artifact."}, {"q": "A fair comparison requires:", "choices": ["A weak baseline", "A properly tuned baseline and a clean split", "Only your method", "A nice chart"], "answer": 1, "explain": "Tune the baseline fairly and keep the split clean."}], "pillars": ["Research integrity", "Open science"], "tier": "Foundation", "resources": [{"title": "Leakage and the Reproducibility Crisis in ML-based science", "org": "Princeton", "url": "https://reproducible.cs.princeton.edu/", "type": "guide+talk", "why": "The definitive deep-dive on the leakage and reproducibility problems this module teaches."}, {"title": "Reproducibility Crisis in ML, Sayash Kapoor talk", "org": "YouTube", "url": "https://www.youtube.com/watch?v=7Bxcz7Z_tY0", "type": "video", "why": "Accessible 30-minute walkthrough of the reproducibility crisis with real examples."}, {"title": "Reproducible Research", "org": "Inria / FUN-MOOC", "url": "https://www.fun-mooc.fr/", "type": "course", "why": "Structured course on reproducible research practices across disciplines."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce the matching artifact in a real Learning Lab run (e.g. a gate record, a data inventory, a model info sheet)."}}, {"id": "ethics", "title": "Research ethics & data stewardship", "summary": "The duties that come before the science.", "lessons": [{"id": "care", "title": "Who and what you owe care to", "subtitle": "People, data, and credit, before results.", "blocks": [{"type": "concept", "title": "Ethics is not a final checkbox, it runs at every gate", "html": "<p>Cambium's research-conduct officer reviews each phase, not just the end. The recurring duties: protect human and animal subjects (IRB/IACUC), disclose conflicts of interest, respect data privacy and sovereignty (FERPA-style rules, Indigenous data governance), assign authorship and credit honestly, and watch for dual-use risk.<\/p>", "why": "By the time a study is finished, an ethics problem is expensive to fix. Catching it at the design gate is cheap."}, {"type": "flashcards", "cards": [{"front": "IRB / IACUC", "back": "Review boards for research on human / animal subjects."}, {"front": "Conflict of interest", "back": "A stake that could bias the work. It must be disclosed, not hidden."}, {"front": "Data sovereignty", "back": "The right of a community to govern data about itself."}, {"front": "Dual-use", "back": "Work that could be repurposed to cause harm."}]}, {"type": "predict", "q": "When does ethics review happen in a Cambium run?", "choices": ["Only at the very end", "At every gate, throughout the lifecycle", "Never, it is automatic", "Only if you ask"], "answer": 1, "explain": "The research-conduct officer signs off (or blocks) at each phase, because problems are cheapest to fix early."}, {"type": "explain", "prompt": "Why review ethics at the design stage instead of waiting for results?", "model": "<p>Because the costly mistakes (collecting data you had no consent for, a design that harms subjects, a hidden conflict) are baked in at the start. Catching them before any data is gathered protects people and saves the whole project from being unusable.<\/p>"}]}, {"id": "data", "title": "Stewarding data responsibly", "subtitle": "Provenance, privacy, and not over-collecting.", "blocks": [{"type": "concept", "title": "Good data stewardship in four habits", "html": "<p>Know where the data came from (provenance). Collect only what you need (minimization). Screen for personal and sensitive fields (PII) before analysis. Record the schema, units, and licensing so the next person, including future you, can trust and reuse it.<\/p>"}, {"type": "worked", "title": "Handle a sensitive dataset", "steps": ["A dataset arrives with names, addresses, and test scores.", "Data steward logs provenance: who collected it, under what consent.", "PII screen flags names and addresses as direct identifiers.", "Those columns are removed or pseudonymized before any modeling.", "Schema, units, and license are written into a data dictionary."], "yourturn": {"prompt": "You are handed a spreadsheet of student records to analyze. What do you do before running anything?", "hint": "Two duties come first: where did it come from, and what sensitive fields are in it.", "solution": "<p>First confirm provenance and consent (are you allowed to use this for this purpose, FERPA-style rules apply to student data). Then screen for PII and remove or pseudonymize identifiers you don't need. Only then analyze, and document the schema as you go.<\/p>"}}, {"type": "predict", "q": "Which is the most privacy-protective default?", "choices": ["Collect everything in case it is useful", "Collect only the fields the question needs", "Share raw data widely", "Skip documentation"], "answer": 1, "explain": "Data minimization. Less sensitive data collected means less to protect and less to leak."}, {"type": "explain", "prompt": "Explain why provenance matters even if the data 'looks fine.'", "model": "<p>Provenance tells you whether you are even allowed to use the data and for what, and it lets others trust and reproduce your work. Clean-looking data with unknown origins might be unlicensed, collected without consent, or subtly biased in ways you can't see without knowing where it came from.<\/p>"}]}], "quiz": [{"q": "Ethics review in Cambium happens:", "choices": ["Once at the end", "At every gate across the lifecycle", "Only for medical work", "Never"], "answer": 1, "explain": "The research-conduct officer reviews each phase."}, {"q": "Data minimization means:", "choices": ["Collect everything", "Collect only what the question needs", "Delete all data", "Compress files"], "answer": 1, "explain": "Collect only what you need, to reduce privacy risk."}, {"q": "Provenance is:", "choices": ["The file size", "The record of where data came from and under what terms", "A type of model", "The license fee"], "answer": 1, "explain": "Where the data came from and under what consent/terms."}], "pillars": ["Research integrity", "Open science"], "tier": "Foundation", "resources": [{"title": "Responsible Conduct of Research", "org": "Utrecht / Coursera", "url": "https://www.coursera.org/learn/research-integrity", "type": "course", "why": "Foundational course on research integrity, ethics, and data stewardship."}, {"title": "Human Research Protection foundational training", "org": "HHS OHRP", "url": "https://www.hhs.gov/ohrp/education-and-outreach/", "type": "course", "why": "The US federal baseline for protecting human research subjects."}, {"title": "NIH Data Management and Sharing Policy", "org": "NIH", "url": "https://sharing.nih.gov/data-management-and-sharing-policy", "type": "guide", "why": "Sets the standard for data stewardship in federally funded research."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce the matching artifact in a real Learning Lab run (e.g. a gate record, a data inventory, a model info sheet)."}}, {"id": "grant", "title": "Grant Writing with Cambium", "summary": "Hands-on: from RFP to submitted proposal.", "lessons": [{"id": "rfp", "title": "Reading an RFP like an analyst", "subtitle": "Extract requirements, criteria, and budget before you write.", "blocks": [{"type": "concept", "title": "The RFP anatomy", "html": "<p>Every RFP has a hidden structure: <b>eligibility<\/b> (who can apply), <b>scope<\/b> (what they fund), <b>criteria<\/b> (how they score), <b>budget<\/b> (what they will pay), and <b>deadline<\/b> (when it is due). Cambium's RFP-Analyst extracts these automatically, but you must verify them.<\/p>", "why": "Missing one eligibility rule kills a proposal faster than a weak idea."}, {"type": "flashcards", "cards": [{"front": "Eligibility", "back": "Who can apply. Institution type, career stage, prior awards."}, {"front": "Scope", "back": "What the funder will actually pay for."}, {"front": "Criteria", "back": "How proposals are scored. Usually innovation, feasibility, team, impact."}, {"front": "Budget ceiling", "back": "The maximum amount you can request."}]}, {"type": "worked", "title": "Parse an RFP in 5 minutes", "steps": ["Open the RFP and search for 'eligible', note every restriction.", "Search for 'scope' or 'areas', highlight the exact topics.", "Find the evaluation criteria and their weights.", "Note the budget ceiling and any cost-sharing requirements.", "Put the deadline in your calendar with two reminders."], "yourturn": {"prompt": "You have an RFP open. What is the FIRST thing you should check before reading the rest?", "hint": "If you are not eligible, nothing else matters.", "solution": "<p>Eligibility. If your institution, career stage, or project type does not qualify, the rest of the RFP is irrelevant. Check eligibility first, every time.<\/p>"}}]}, {"id": "aims", "title": "Writing Specific Aims", "subtitle": "The single most important page of your proposal.", "blocks": [{"type": "concept", "title": "Aims are a promise, not a summary", "html": "<p>The Specific Aims page is the only page every reviewer reads. It must answer: <b>What<\/b> (the gap), <b>Why<\/b> (the significance), and <b>How<\/b> (the approach), in one page. Each aim must be specific, measurable, and feasible within the budget and timeline.<\/p>", "why": "A vague aim ('understand climate change') kills a proposal. A specific aim ('quantify soil carbon loss under three tillage regimes') gets funded."}, {"type": "predict", "q": "Which aim is stronger?", "choices": ["Study forest health.", "Quantify post-fire tree mortality across 500 plots in the Northern Rockies using UAV imagery.", "Understand climate impacts.", "Do research on ecosystems."], "answer": 1, "explain": "It names the variable (mortality), the scale (500 plots), the location (Northern Rockies), and the method (UAV imagery). Reviewers can picture it."}, {"type": "explain", "prompt": "Rewrite this aim to be specific: 'We will study water quality.'", "model": "<p>Something like: 'We will measure dissolved nitrogen and phosphorus concentrations in 12 headwater streams monthly for two years, comparing agricultural, urban, and forested catchments to identify the dominant land-use driver of nutrient loading.' It names the variables, the sites, the frequency, and the comparison.<\/p>"}]}], "quiz": [{"q": "What is the first thing to check in any RFP?", "choices": ["The budget ceiling", "Eligibility", "The review criteria", "The deadline"], "answer": 1, "explain": "Eligibility first. If you do not qualify, nothing else matters."}, {"q": "A strong Specific Aims page answers:", "choices": ["What, Why, and How", "Just What", "The full budget", "All references"], "answer": 0, "explain": "What (gap), Why (significance), How (approach)."}, {"q": "Which aim is more fundable?", "choices": ["Study forest health broadly", "Quantify post-fire mortality across 500 plots using UAV imagery", "Do research on trees", "Understand ecosystems"], "answer": 1, "explain": "Specific, measurable, and feasible."}], "pillars": ["Research integrity", "Responsible-AI reasoning"], "tier": "Practitioner", "resources": [{"title": "Grant Writing for Scientists", "org": "Nature Masterclasses", "url": "https://www.nature.com/nature-masterclasses", "type": "course", "why": "Professional grant-writing training from the publisher."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce a real Specific Aims page or RFP analysis in a Cambium run."}}, {"id": "data", "title": "Data Stewardship Workshop", "summary": "Hands-on: provenance, privacy, and reproducible data handling.", "lessons": [{"id": "provenance", "title": "Tracking where data came from", "subtitle": "Every dataset needs a birth certificate.", "blocks": [{"type": "concept", "title": "The Data Provenance Checklist", "html": "<p>Before you analyze any dataset, document: <b>Source<\/b> (who collected it), <b>Method<\/b> (how it was collected), <b>Consent<\/b> (what the subjects agreed to), <b>License<\/b> (what you are allowed to do with it), <b>Date<\/b> (when it was collected), and <b>Version<\/b> (which file you have). Cambium's Data-Steward agent generates this automatically.<\/p>", "why": "Without provenance, you cannot trust the data, reproduce the analysis, or defend it in peer review."}, {"type": "worked", "title": "Document a dataset in 5 minutes", "steps": ["Open the data file and note the filename, size, and date.", "Find the source: a paper, a repository, a colleague, or your own collection.", "Record the collection method: sensor, survey, experiment, simulation.", "Check for a license or terms of use. If none, ask the owner.", "Write a one-paragraph description and save it as a README."], "yourturn": {"prompt": "You receive a CSV file from a collaborator with no documentation. What do you do first?", "hint": "You need two things before you can use it: where it came from, and whether you are allowed to.", "solution": "<p>Email the collaborator asking: (1) how the data was collected, (2) what license it is under, and (3) whether there are any restrictions on use. Do not analyze until you have answers. Document everything in a README.<\/p>"}}]}, {"id": "pii", "title": "Finding and handling PII", "subtitle": "Protect people before you protect pixels.", "blocks": [{"type": "concept", "title": "PII is not just names and emails", "html": "<p>Direct identifiers: name, address, phone, email, SSN, student ID. Quasi-identifiers: zip code, birth date, gender, ethnicity, combinations of these can re-identify individuals. Cambium's data-scan tool flags both. You must remove or pseudonymize direct identifiers before analysis, and assess re-identification risk from quasi-identifiers.<\/p>", "why": "FERPA, GDPR, and IRB rules all require that you protect identifiable information. A leak can end a career."}, {"type": "predict", "q": "Which field is most dangerous to leave in a dataset?", "choices": ["Height (in cm)", "Student email address", "Age (in years)", "Test score"], "answer": 1, "explain": "Email is a direct identifier. It links the record to a real person instantly."}]}], "quiz": [{"q": "What is the first thing to document about any dataset?", "choices": ["The mean value", "The source and license", "The file size", "The color scheme"], "answer": 1, "explain": "Source and license determine whether you can use it and how."}, {"q": "A direct identifier is:", "choices": ["Age in years", "Zip code", "Email address", "Gender"], "answer": 2, "explain": "Email directly identifies a person."}, {"q": "Before analyzing any dataset with human subjects, you should:", "choices": ["Start modeling immediately", "Screen for PII and document provenance", "Share it with collaborators", "Delete it"], "answer": 1, "explain": "PII screening and provenance documentation are required before analysis."}], "pillars": ["Research integrity", "Open science"], "tier": "Practitioner", "resources": [{"title": "NIH Data Management and Sharing Policy", "org": "NIH", "url": "https://sharing.nih.gov/data-management-and-sharing-policy", "type": "guide", "why": "Federal standard for data stewardship."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Create a real data provenance record and PII screening log in a Cambium run."}}, {"id": "repro", "title": "Reproducibility in Practice", "summary": "Make your analysis runnable by anyone, including future you.", "lessons": [{"id": "env", "title": "Environment reproducibility", "subtitle": "Code that runs on your machine should run on theirs.", "blocks": [{"type": "concept", "title": "The reproducibility stack", "html": "<p>Reproducible research has four layers: <b>Code<\/b> (version-controlled, commented), <b>Environment<\/b> (dependencies pinned), <b>Data<\/b> (provenance documented, available), <b>Compute<\/b> (hardware/OS noted, or containerized). Cambium's Research-Engineer agent checks all four and flags gaps.<\/p>", "why": "A beautiful result that only runs on your laptop is not science. It is a demo."}, {"type": "worked", "title": "Make a script reproducible in 10 minutes", "steps": ["Add a README with: what the script does, what data it needs, and how to run it.", "List all dependencies with exact versions (pip freeze > requirements.txt).", "Replace hardcoded paths with relative paths or command-line arguments.", "Set a random seed so the output is deterministic.", "Run it in a fresh environment and verify it produces the same result."], "yourturn": {"prompt": "Your collaborator says 'the script does not work on my machine.' What is the most likely cause?", "hint": "Think about what differs between your machine and theirs.", "solution": "<p>Most likely: missing dependencies, different versions, or hardcoded paths. The fix is a requirements.txt with pinned versions, and relative paths. Second most likely: a different OS or Python version. Document both.<\/p>"}}]}, {"id": "run_record", "title": "Seeds, hashes, and run records", "subtitle": "Lock every stochastic choice so anyone can rerun and confirm.", "blocks": [{"type": "concept", "title": "Three levers that kill silent irreproducibility", "html": "<p>Most irreproducible results trace back to three unfixed choices: <b>random seeds<\/b> (different runs sample differently), <b>dependency versions<\/b> (a library update changes output silently), and <b>no run record<\/b> (nobody wrote down what actually executed). Cambium's Research-Engineer agent locks all three automatically: it pins the environment in a <code>requirements.txt<\/code> or <code>environment.yml<\/code>, injects a global seed at the top of every script, and writes a <code>run_record.json<\/code> that captures the git commit, timestamp, and SHA-256 hash of every output file. The hash is the receipt: rerun the code, compare hashes, and you know whether the result is identical.<\/p>", "why": "A locked seed makes a stochastic pipeline deterministic. A hash turns 'I think it reproduced' into a verifiable yes or no."}, {"type": "predict", "q": "You pin the random seed and freeze the environment, then rerun your analysis. The SHA-256 hash of the output CSV differs from the original. What is the most likely cause?", "choices": ["The seed is working correctly", "A data preprocessing step reads files in non-deterministic order", "The paper is now published so results change", "SHA-256 hashes are expected to differ on rerun"], "answer": 1, "explain": "Pinning the seed controls sampling, but if an upstream step reads directory listings or network responses in arbitrary order, the data entering the analysis can still vary. The fix is to sort inputs explicitly before processing."}, {"type": "flashcards", "cards": [{"front": "Why set a global random seed?", "back": "So every stochastic step (sampling, train/test split, model init) produces the same sequence of numbers on every run."}, {"front": "What does a run record capture?", "back": "The git commit hash, timestamp, environment snapshot, and SHA-256 hashes of all output files."}, {"front": "How do you confirm a result reproduced exactly?", "back": "Rerun the code and compare the SHA-256 hash of the output against the hash stored in the original run record."}, {"front": "What is provenance in Cambium?", "back": "The chain of logged steps from raw inputs to final outputs, including who ran what, when, with which code and data versions."}]}, {"type": "worked", "title": "Add a run record to an existing script", "steps": ["Add 'import random, hashlib, json, datetime' at the top.", "Set 'SEED = 42' and pass it to every random call and to numpy/sklearn.", "After writing each output file, compute its SHA-256: hashlib.sha256(open(path,'rb').read()).hexdigest().", "Bundle seed, git commit (from subprocess), timestamp, and hashes into a dict and write it as run_record.json.", "In a fresh virtual environment, rerun the script and confirm the new run_record.json hashes match the original."], "yourturn": {"prompt": "A collaborator says your code reproduces, but the output CSV has a different number of rows on their machine. What is the first thing you check in the run record?", "hint": "Row count changes without a seed issue usually means the input data changed.", "solution": "<p>Check the hash of the input CSV logged in the run record. If it differs, the collaborator has a different version of the raw data. Reproducibility of code does not help if the starting data is not identical. Distribute data with its own hash and document the source.<\/p>"}}]}], "quiz": [{"q": "What makes research reproducible?", "choices": ["Pretty charts", "Code, environment, data, and compute documented", "A long paper", "Famous authors"], "answer": 1, "explain": "All four layers must be documented."}, {"q": "The most common reproducibility failure is:", "choices": ["Wrong theory", "Missing or mismatched dependencies", "Bad grammar", "Too short"], "answer": 1, "explain": "Dependency mismatches are the #1 cause of 'it works on my machine.'"}], "pillars": ["Open science", "Research integrity"], "tier": "Practitioner", "resources": [{"title": "Reproducible Research", "org": "Inria / FUN-MOOC", "url": "https://www.fun-mooc.fr/", "type": "course", "why": "Structured course on reproducible research practices."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Produce a reproducible analysis package (code + requirements + README) in a Cambium run."}}, {"id": "custom", "title": "Designing Custom Agents", "summary": "Build agents that fit your specific research domain.", "lessons": [{"id": "spec", "title": "The Agent Specification", "subtitle": "What every agent needs to be useful and safe.", "blocks": [{"type": "concept", "title": "An agent is a contract, not just a prompt", "html": "<p>A Cambium agent has: <b>name<\/b> (unique, memorable), <b>description<\/b> (what it does), <b>model<\/b> (inherit, opus, sonnet, or haiku), <b>tools<\/b> (what it can call), <b>prompt<\/b> (the system instruction), <b>output contract<\/b> (severity + evidence tier), and <b>tests<\/b> (how you verify it works). The agent spec is a YAML frontmatter block in a markdown file. Every agent lives in <code>.claude/agents/<\/code>.<\/p>", "why": "A vague agent ('help with science') fails. A specific agent ('review statistical assumptions in a methods section') succeeds."}, {"type": "worked", "title": "Write a custom agent in 15 minutes", "steps": ["Pick a single, narrow task (e.g., 'check for ANOVA assumptions').", "Write a 2-3 sentence description.", "Choose the right model: opus for deep reasoning, sonnet for routine, haiku for quick checks.", "Write the system prompt with clear instructions, examples, and the output contract.", "Add a test: a sample input and the expected output structure.", "Save as <code>.claude/agents/99-my-agent.md<\/code> and run <code>tools/check_agents.py<\/code>."], "yourturn": {"prompt": "Design an agent for a specific task in your field. What is its name, model, and one-sentence description?", "hint": "The narrower the task, the better the agent.", "solution": "<p>Example: 'soil-carbon-estimator' (sonnet), 'Given a land-use map and soil sampling design, estimate total soil carbon stock and uncertainty using stratified random sampling.' It is specific, measurable, and uses a defined method.<\/p>"}}]}, {"id": "council", "title": "Fitting an agent into a council", "subtitle": "One job, one seat, one output contract.", "blocks": [{"type": "concept", "title": "Why one job per agent is not a limitation", "html": "<p>A Cambium agent that tries to do several things is harder to test, harder to trust, and harder to swap out. The design rule is: <b>one job, one seat in a council<\/b>. The agent's YAML frontmatter declares its name and a single-sentence description that a reviewer can evaluate. The output contract specifies the severity (info, warn, block) and the evidence tier each finding must carry. When the orchestrator assembles a council, it reads those contracts and knows exactly what each agent will contribute and what it will not touch.<\/p><p>An agent that raises a <b>block<\/b>-severity finding halts the run and routes to a human gate. An agent that raises <b>info<\/b> adds a note without stopping anything. Choosing the right severity is part of the design.<\/p>", "why": "A narrow job means a short, testable system prompt. A clear output contract means the orchestrator can trust the agent without reading its internals."}, {"type": "predict", "q": "You are designing an agent that checks whether a dataset has any direct PII (names, emails). It finds a name column. What severity should it raise?", "choices": ["info, because the user probably knows", "warn, to note it without stopping anything", "block, because proceeding with PII present requires human approval", "No severity, just log to console"], "answer": 2, "explain": "Unscreened PII is a hard stop in responsible research. Block forces a human gate before any further processing. Warn would let the run continue, which is the wrong default for identifiable data."}, {"type": "flashcards", "cards": [{"front": "Where does a custom agent live in Cambium?", "back": "As a markdown file in .claude/agents/, with YAML frontmatter declaring name, description, model, and tools."}, {"front": "What is an output contract?", "back": "A declaration of the severity levels (info/warn/block) and evidence tiers an agent's findings must carry."}, {"front": "Why should a custom agent have exactly one job?", "back": "Single-responsibility makes the agent testable with a small set of cases, and replaceable without changing the rest of the council."}, {"front": "What happens when an agent raises a 'block' finding?", "back": "The run halts and routes to a human gate for approval before anything continues."}]}, {"type": "explain", "prompt": "You have written an agent that checks for PII and an agent that checks for data leakage. A colleague suggests merging them into one agent to save files. Explain why you would keep them separate.", "model": "<p>PII checking and leakage checking are two different jobs with different triggers and different severities. Merging them makes the system prompt longer and the tests harder to write. More importantly, if one check needs updating (say, a new leakage rule), you do not want to risk breaking the PII logic at the same time. Separate files, separate contracts, separate tests. The orchestrator composes them into the right council at runtime.<\/p>"}]}], "quiz": [{"q": "A good agent specification includes:", "choices": ["Just a name", "Name, description, model, tools, prompt, output contract, and tests", "A long essay", "Only the prompt"], "answer": 1, "explain": "All seven fields are needed for a reliable, testable agent."}], "pillars": ["Responsible-AI reasoning"], "tier": "Expert", "resources": [{"title": "Agent Specification Guide", "org": "Cambium", "url": "docs/concepts/ROLES.md", "type": "guide", "why": "The canonical reference for Cambium agent authoring."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Write a custom agent spec and test it with check_agents.py.", "expert": "Teach someone else to write an agent, then review their spec for completeness."}}, {"id": "teach", "title": "Teaching Research with Cambium", "summary": "Use Cambium as a teaching tool for research methods courses.", "lessons": [{"id": "classroom", "title": "Cambium in the Classroom", "subtitle": "How to use the institute as a teaching assistant.", "blocks": [{"type": "concept", "title": "Cambium as a teaching tool", "html": "<p>Cambium is not just for research, it is a platform for teaching research. Students can run a proposal, see the verification process, and learn why gates matter. The Academy provides the theory; the institute provides the practice. Use <code>/cambium-mode solo<\/code> for quick exercises, and full runs for capstone projects.<\/p>", "why": "Students learn research integrity by doing it, not by reading about it."}, {"type": "worked", "title": "Design a research-methods assignment", "steps": ["Choose a learning objective (e.g., 'write a falsifiable hypothesis').", "Pick a Cambium mode: solo for quick practice, full run for deep learning.", "Set the gate as the grading checkpoint: students must explain their decision.", "Use the Learning Lab output as the deliverable.", "Grade on decision quality, not just output quality."], "yourturn": {"prompt": "Design one assignment where students use Cambium to learn a research skill. What is the skill, and where is the gate?", "hint": "The gate is where the learning happens.", "solution": "<p>Example: 'Design a study to test X.' Students run Cambium to generate a design, then at Gate G2 (design approval) they must write a 200-word justification for their chosen approach. Grade them on the rigor of their justification, not the elegance of the design.<\/p>"}}]}, {"id": "learning_gate", "title": "The Learning Gate and the learning packet", "subtitle": "Turning active research runs into structured student reflection.", "blocks": [{"type": "concept", "title": "What the Learning Gate actually does", "html": "<p>At the end of every substantial Cambium run the teaching assistant produces a <b>learning packet<\/b>: a plain-language summary of what happened and why, a real architecture diagram of the run, the key decisions and their tradeoffs, and an open invitation for the student to ask follow-up questions. This is the Learning Gate.<\/p><p>The gate is not a quiz bolted on at the end. It is built into the run: the teaching assistant uses the actual artifacts (gate records, evidence tiers, agent outputs) as teaching material. The student then gets an interactive Learning Lab with predict-then-reveal questions, spaced-repetition flashcards, and a 'your turn' change to make. The Director (instructor or student) must contribute at least one response before the session closes.<\/p>", "why": "Reading about research integrity is much weaker than reviewing a real gate decision you just made. The learning packet ties the lesson to the student's own work."}, {"type": "predict", "q": "A student completes a Cambium run and the teaching assistant generates a learning packet. What should the student do BEFORE the session closes to satisfy the Learning Gate?", "choices": ["Download the final report only", "Submit the run to the instructor without reading the packet", "Engage with the packet by answering at least one predict-then-reveal question or writing an explain-it-back response", "Re-run the entire analysis from scratch"], "answer": 2, "explain": "The Learning Gate requires active participation, not passive receipt. The Director must contribute a response so the learning is confirmed, not just delivered."}, {"type": "flashcards", "cards": [{"front": "What is a learning packet?", "back": "A plain-language brief produced after a run: what happened, why, the architecture diagram, key decisions, and an invitation for follow-ups."}, {"front": "What is the Learning Gate?", "back": "A structured pause after a run where the student engages with the learning packet before the session is considered complete."}, {"front": "How does predict-then-reveal work in a Learning Lab?", "back": "The student commits to an answer before seeing the correct one. This active retrieval strengthens memory compared to just reading the answer."}, {"front": "Why must the Director contribute a response at the Learning Gate?", "back": "To confirm that learning happened, not just that output was produced. Passive receipt of a packet is not the same as understanding it."}]}, {"type": "worked", "title": "Design a Learning Gate assignment", "steps": ["Pick a learning objective: for example, 'student can identify an overclaim in a draft result.'", "Set up a Cambium run where the verification agent flags a likely overclaim.", "At the gate, require the student to write a 150-word justification for their approve/revise/reject choice.", "After the gate, the teaching assistant generates a learning packet using the gate record as evidence.", "The student answers the predict-then-reveal block in the lab before submitting.", "Grade on the quality of the gate justification and the explain-it-back response, not the final output."], "yourturn": {"prompt": "Design a Learning Gate moment for a class learning about data leakage. What does the student see at the gate, and what must they write before continuing?", "hint": "Think about what the verification agent would flag, and what the student needs to articulate to show they understand it.", "solution": "<p>The verification agent flags a suspiciously high AUC (0.97) and notes that a feature called 'discharge_code' may encode the outcome. At the gate the student sees the flagged feature, the AUC, and the agent's note. Before they can continue, they must write: (1) whether this is likely leakage and why, (2) what they would remove or change, and (3) what they expect the AUC to be after the fix. That three-part response forces the student to reason, not just click approve.<\/p>"}}]}], "quiz": [{"q": "The best place to assess student learning in Cambium is:", "choices": ["The final output", "The gate decision with justification", "The number of agents used", "The speed of completion"], "answer": 1, "explain": "The gate decision reveals whether the student understood the trade-offs."}], "pillars": ["Research integrity", "Responsible-AI reasoning"], "tier": "Expert", "resources": [{"title": "Teaching Research Integrity", "org": "ORI", "url": "https://ori.hhs.gov/", "type": "guide", "why": "Federal guidance on teaching responsible conduct of research."}], "badge": {"foundation": "Pass the cold mastery check for this module.", "practitioner": "Run a Cambium-based assignment with at least 3 students.", "expert": "Publish or present your Cambium teaching methodology."}}], "tiers_note": "Foundation = conceptual understanding. Practitioner = hands-on skill with real artifacts. Expert = teach others and design new systems."}</script>
<script>
const LAB = JSON.parse(document.getElementById('lab-data').textContent);
document.getElementById('brandsub').textContent = LAB.brand || 'Learning Lab';
const KEY = 'cambium-lab:' + (LAB.id||'lab');
const HAS_LS = (()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true}catch(e){return false}})();
let store = load();
let cur = store.last || {m:0,l:0};
function load(){ if(!HAS_LS) return {done:{},cards:{},mastery:{}}; try{return JSON.parse(localStorage.getItem(KEY))||{done:{},cards:{},mastery:{}}}catch(e){return {done:{},cards:{},mastery:{}}} }
function save(){ store.last=cur; if(HAS_LS) try{localStorage.setItem(KEY,JSON.stringify(store))}catch(e){} }
function lid(m,l){return m+':'+l}
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function totalLessons(){return LAB.modules.reduce((a,m)=>a+m.lessons.length,0)}
function doneCount(){return Object.values(store.done).filter(Boolean).length}
function masterCount(){return Object.values(store.mastery).filter(Boolean).length}

function renderNav(){
 const nav=document.getElementById('nav'); nav.innerHTML='';
 LAB.modules.forEach((m,mi)=>{
  const wrap=document.createElement('div'); wrap.className='mod';
  const mastered=store.mastery[mi];
  wrap.innerHTML=`<h4>${esc(m.title)}<span class="mbadge ${mastered?'master':''}">${mastered?'Mastered':'Module '+(mi+1)}</span></h4>`;
  // Pillar + tier pills
  if((m.pillars&&m.pillars.length)||m.tier){
   const pills=document.createElement('div'); pills.className='mpills';
   if(m.tier){const p=document.createElement('span');p.className='mpill tier';p.textContent=m.tier;pills.appendChild(p)}
   (m.pillars||[]).forEach(pl=>{const p=document.createElement('span');p.className='mpill';p.textContent=pl;pills.appendChild(p)});
   wrap.appendChild(pills);
  }
  const ul=document.createElement('ul'); ul.className='lnav';
  m.lessons.forEach((les,li)=>{
   const done=store.done[lid(mi,li)];
   const li2=document.createElement('li');
   li2.className=(mi===cur.m&&li===cur.l?'active ':'')+(done?'done':'');
   li2.innerHTML=`<span class="tick">&#10003;</span>${esc(les.title)}`;
   li2.onclick=()=>{cur={m:mi,l:li};save();renderAll()};
   ul.appendChild(li2);
  });
  // mastery check row
  const q=document.createElement('li');
  q.className=(cur.m===mi&&cur.l==='quiz'?'active ':'')+(store.mastery[mi]?'done':'');
  q.innerHTML=`<span class="tick">&#10003;</span><b style="color:var(--warn)">Mastery check</b>`;
  q.onclick=()=>{cur={m:mi,l:'quiz'};save();renderAll()};
  ul.appendChild(q);
  wrap.appendChild(ul); nav.appendChild(wrap);
 });
 const pct=Math.round(100*doneCount()/Math.max(1,totalLessons()));
 document.getElementById('ovbar').style.width=pct+'%';
 document.getElementById('ovpct').textContent=pct+'% of lessons';
 document.getElementById('ovmaster').textContent=masterCount()+' / '+LAB.modules.length+' modules mastered';
}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e}

// Flashcard spacing: box -> delay in ms
const FC_BOX_DELAYS=[86400000,259200000,604800000,1382400000]; // 1d,3d,7d,16d
function fcDue(box){return Date.now()+FC_BOX_DELAYS[Math.min(box,FC_BOX_DELAYS.length-1)];}
function fcRelDate(ts){
 const d=Math.round((ts-Date.now())/86400000);
 if(d<=0)return 'today';
 if(d===1)return 'tomorrow';
 return 'in '+d+' days';
}

function renderBlock(b,mi,li,bi){
 const card=el('section','block');
 if(b.type==='concept'){
  card.innerHTML=`<div class="kicker">&#128161; Concept</div>${b.title?`<h3>${esc(b.title)}</h3>`:''}<div>${b.html||''}</div>${b.why?`<div class="why">${esc(b.why)}</div>`:''}`;
  return card;
 }
 if(b.type==='predict'){
  card.innerHTML=`<div class="kicker">&#129504; Predict, then check &nbsp;<span style="color:var(--mut);font-weight:500;text-transform:none;letter-spacing:0">retrieval beats rereading</span></div><h3>${esc(b.q)}</h3>`;
  const ch=el('div','choices');
  const fb=el('div','fb');
  b.choices.forEach((c,ci)=>{
   const btn=el('button','choice',`<span class="ix">${String.fromCharCode(65+ci)}</span><span>${esc(c)}</span>`);
   btn.onclick=()=>{
    if(card.dataset.answered)return; card.dataset.answered='1';
    [...ch.children].forEach(x=>x.disabled=true);
    if(ci===b.answer){btn.classList.add('correct');fb.className='fb show ok';fb.innerHTML='<b>Correct.</b> '+esc(b.explain||'');}
    else{btn.classList.add('wrong');ch.children[b.answer].classList.add('correct');fb.className='fb show no';fb.innerHTML='<b>Not quite.</b> '+esc(b.explain||'');}
    markEngaged(mi,li,bi);
   };
   ch.appendChild(btn);
  });
  card.appendChild(ch); card.appendChild(fb); return card;
 }
 if(b.type==='reveal'){
  card.innerHTML=`<div class="kicker">&#9997; Recall it first</div><h3>${esc(b.prompt)}</h3><p class="mut" style="font-size:13px">Write your answer before revealing. The effort of retrieving is what builds the memory.</p>`;
  const ta=el('textarea','in'); ta.placeholder='Your answer...';
  const row=el('div','row');
  const rb=el('button','btn','Reveal answer');
  const model=el('div','model',`<h5>A strong answer</h5><div>${b.answer||''}</div>`);
  const rate=el('div','rate'); rate.style.display='none';
  ['Missed it','Fuzzy','Nailed it'].forEach((t,k)=>{const x=el('button',null,t);x.onclick=()=>{[...rate.children].forEach(y=>y.classList.remove('sel'));x.classList.add('sel');markEngaged(mi,li,bi)};rate.appendChild(x)});
  rb.onclick=()=>{model.classList.add('show');rate.style.display='flex';rb.style.display='none'};
  row.appendChild(rb); card.appendChild(ta); card.appendChild(row); card.appendChild(model); card.appendChild(rate);
  return card;
 }
 if(b.type==='flashcards'){
  card.innerHTML=`<div class="kicker">&#127183; Retrieval practice now, spaced review across sessions &nbsp;<span style="color:var(--mut);font-weight:500;text-transform:none;letter-spacing:0">rate honestly</span></div>`;
  const deck=el('div','deck');
  const ckey=(ci)=>lid(mi,li)+':c'+ci;
  let idx=0;
  // Spacing banner
  const banner=el('div','spacing-banner','&#128197; Spacing works across days ,  come back tomorrow to review what\'s due.');
  deck.appendChild(banner);
  const cardBox=el('div','card');
  const bar=el('div','deckbar');
  const dueNote=el('div','card-due-note'); dueNote.style.display='none';
  const inner=el('div','inner');
  inner.innerHTML=`<div class="face front"><span class="tag">Question</span><span class="ftext"></span></div><div class="face back"><span class="tag">Answer</span><span class="btext"></span></div>`;
  cardBox.appendChild(inner);
  cardBox.onclick=()=>cardBox.classList.toggle('flip');
  const rate=el('div','rate');
  function paint(){
   const c=b.cards[idx];
   cardBox.classList.remove('flip');
   inner.querySelector('.ftext').textContent=c.front;
   inner.querySelector('.btext').textContent=c.back;
   const stored=store.cards[ckey(idx)]||{box:0,due:0};
   const box=typeof stored==='number'?stored:stored.box||0;
   const due=typeof stored==='number'?0:stored.due||0;
   const isDue=due<=Date.now();
   bar.innerHTML=`<span>Card ${idx+1} / ${b.cards.length}</span><span>${box>=3?'&#9733; remembered':'box '+(box+1)}</span>`;
   if(!isDue&&due>0){
    dueNote.textContent='Reviewed ,  due again '+fcRelDate(due)+'. Reviewing early is fine but counts less.';
    dueNote.style.display='block';
    cardBox.style.opacity='0.72';
   } else {
    dueNote.style.display='none';
    cardBox.style.opacity='1';
   }
  }
  ['Again','Good','Easy'].forEach((t,k)=>{const x=el('button',null,t);x.onclick=(e)=>{e.stopPropagation();
    const k2=ckey(idx);
    const stored=store.cards[k2]||{box:0,due:0};
    let box=typeof stored==='number'?stored:stored.box||0;
    box=k===0?0:Math.min(4,box+(k===2?2:1));
    store.cards[k2]={box:box,due:fcDue(box)};
    save();
    markEngaged(mi,li,bi);
    idx=(idx+1)%b.cards.length; paint();
   };rate.appendChild(x)});
  deck.appendChild(bar); deck.appendChild(cardBox); deck.appendChild(dueNote); deck.appendChild(rate); card.appendChild(deck);
  paint(); return card;
 }
 if(b.type==='diagram'){
  card.innerHTML=`<div class="kicker">&#128506; See how it fits &nbsp;<span style="color:var(--mut);font-weight:500;text-transform:none;letter-spacing:0">click a piece</span></div>${b.caption?`<h3>${esc(b.caption)}</h3>`:''}`;
  const W=720,H=Math.max(220,(Math.max(...b.nodes.map(n=>n.y))/100*300)+120);
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=`<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2a6048"/></marker></defs>`;
  const pos=n=>({x:n.x/100*(W-150)+75, y:n.y/100*(H-90)+45});
  (b.edges||[]).forEach(([a,c])=>{const A=pos(b.nodes.find(n=>n.id===a)),B=pos(b.nodes.find(n=>n.id===c));
    const ln=document.createElementNS(ns,'line');ln.setAttribute('x1',A.x);ln.setAttribute('y1',A.y);ln.setAttribute('x2',B.x);ln.setAttribute('y2',B.y);ln.setAttribute('class','edge');svg.appendChild(ln)});
  const desc=el('div','ndesc','<b>Tip:</b> click any box above to learn what it does.');
  b.nodes.forEach(n=>{const P=pos(n);const g=document.createElementNS(ns,'g');g.setAttribute('class','node');g.setAttribute('transform',`translate(${P.x-65},${P.y-22})`);
    const r=document.createElementNS(ns,'rect');r.setAttribute('width',130);r.setAttribute('height',44);r.setAttribute('rx',9);
    const t=document.createElementNS(ns,'text');t.setAttribute('x',65);t.setAttribute('y',27);t.setAttribute('text-anchor','middle');t.textContent=n.label;
    g.appendChild(r);g.appendChild(t);
    g.onclick=()=>{[...svg.querySelectorAll('.node')].forEach(x=>x.classList.remove('sel'));g.classList.add('sel');desc.innerHTML=`<b>${esc(n.label)}.</b> ${esc(n.desc)}`;markEngaged(mi,li,bi)};
    svg.appendChild(g)});
  const wrap=el('div','diagram'); wrap.appendChild(svg); card.appendChild(wrap); card.appendChild(desc); return card;
 }
 if(b.type==='worked'){
  card.innerHTML=`<div class="kicker">&#128221; Worked example, then your turn</div>${b.title?`<h3>${esc(b.title)}</h3>`:''}`;
  const ol=el('ol','steps'); b.steps.forEach(s=>ol.appendChild(el('li',null,s))); card.appendChild(ol);
  if(b.yourturn){
   const yt=el('div','hintbox');
   yt.innerHTML=`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line)"><div class="kicker" style="color:var(--warn)">&#9654; Your turn</div><p>${esc(b.yourturn.prompt)}</p></div>`;
   const row=el('div','row');
   const hb=el('button','btn ghost','Show a hint');
